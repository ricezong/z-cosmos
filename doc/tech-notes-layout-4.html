    content:`# 深入理解 React 19 的新特性\n\nReact 19 带来了许多令人兴奋的新特性，这些特性将显著改变我们编写 React 应用的方式。\n\n## 1. Server Components 的正式发布\n\nServer Components 允许组件在服务器端渲染，从而减少客户端 JavaScript 的体积。\n\n\`\`\`tsx\nasync function ArticleList() {\n  const articles = await db.article.findMany();\n  return (\n    <ul>\n      {articles.map(article => (\n        <li key={article.id}>{article.title}</li>\n      ))}\n    </ul>\n  );\n}\n\`\`\`\n\n### 优势分析\n\n- **更小的 Bundle 体积**：服务端组件不会被打包到客户端\n- **直接访问后端资源**：可以在组件中直接访问数据库\n- **自动代码分割**：客户端和服务端组件之间自动实现代码分割\n\n## 2. Actions 的引入\n\nActions 简化了表单提交和数据变更的处理流程。\n\n## 3. use() Hook\n\n新的 \`use()\` Hook 允许在渲染期间读取 Promise 和 Context 的值。\n\n## 4. 性能优化\n\nReact 19 在性能方面做了大量改进，包括编译器优化、自动记忆化等。\n\n## 5. 文档元数据支持\n\nReact 19 原生支持在组件中声明 \`<title>\`、\`<meta>\` 和 \`<link>\` 标签。\n\n## 总结\n\nReact 19 的这些新特性标志着 React 生态系统的重大进步。` },

function renderMarkdown(md) {
  marked.setOptions({
    highlight: function(code, lang) {
      if (lang && hljs.getLanguage(lang)) {
        return hljs.highlight(code, { language: lang }).value;

  });
  return { __html: marked.parse(md) };
}

function NoteList({ onOpenNote }) {
  const [mainCat, setMainCat] = useState('全部');
  const [techCat, setTechCat] = useState('全部');
  const [page, setPage] = useState(1);
  const [loading, setLoading] = useState(false);
  const loadMoreRef = useRef(null);
  const fetchingRef = useRef(false);

  const filtered = useMemo(() => getFilteredNotes(mainCat, techCat), [mainCat, techCat]);
  const displayedNotes = useMemo(() => filtered.slice(0, page * PAGE_SIZE), [filtered, page]);
  const hasMore = displayedNotes.length < filtered.length;

  const handleMainCatChange = (cat) => {
    setMainCat(cat);
    setPage(1);
  };

  const handleTechCatChange = (cat) => {
    setTechCat(cat);
    setPage(1);
  };

  const loadMore = useCallback(() => {
    if (fetchingRef.current || !hasMore) return;
    fetchingRef.current = true;
    setLoading(true);
    setTimeout(() => {
      setPage(p => p + 1);
      setLoading(false);
      fetchingRef.current = false;
    }, 400);
  }, [hasMore]);

  useEffect(() => {
    const el = loadMoreRef.current;
    if (!el) return;
    const observer = new IntersectionObserver(
      entries => { if (entries[0].isIntersecting) loadMore(); },
      { threshold: 0.1 }
    );
    observer.observe(el);
    return () => observer.disconnect();
  }, [loadMore]);

  const featuredNotes = useMemo(() => {
    return [...mockNotes].sort((a, b) => b.viewCount - a.viewCount).slice(0, 5);
  }, []);

  return (
    <div className="min-h-screen bg-gradient-to-br from-slate-50 via-white to-slate-50">
      <header className="sticky top-0 z-30 bg-white/80 backdrop-blur-xl border-b border-slate-200/60">
        <div className="max-w-6xl mx-auto px-4 sm:px-6 py-4">
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-3">
              <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-emerald-400 to-teal-500 flex items-center justify-center shadow-lg shadow-emerald-500/20">
                <Icons.BookOpen />
              </div>
              <div>
                <h1 className="text-xl font-bold text-slate-900">技术笔记</h1>
                <p className="text-xs text-slate-400 -mt-0.5">探索 · 记录 · 分享</p>
              </div>
            </div>
            <div className="flex items-center gap-2 text-sm text-slate-400">
              <Icons.Search />
              <span className="hidden sm:inline">搜索</span>
            </div>
          </div>
        </div>
      </header>

      <div className="max-w-6xl mx-auto px-4 sm:px-6 py-6">
        <div className="flex items-center gap-2 mb-4">
          {mainCategories.map(cat => (
            <button
              key={cat.value}
              onClick={() => handleMainCatChange(cat.value)}
              className={`px-5 py-2 rounded-xl text-sm font-medium transition-all duration-200 ${
                mainCat === cat.value
                  ? 'bg-slate-900 text-white shadow-lg shadow-slate-900/20'
                  : 'bg-slate-100 text-slate-600 hover:bg-slate-200'
              }`}
            >
              {cat.label}
            </button>
          ))}
        </div>

        <div className="flex items-center gap-2 mb-8 overflow-x-auto pb-2">
          {techCategories.map(cat => (
            <button
              key={cat.value}
              onClick={() => handleTechCatChange(cat.value)}
              className={`px-4 py-1.5 rounded-lg text-sm font-medium transition-all duration-200 whitespace-nowrap ${
                techCat === cat.value
                  ? 'bg-emerald-50 text-emerald-700 ring-1 ring-emerald-200'
                  : 'bg-white text-slate-500 hover:bg-slate-50 ring-1 ring-slate-200/60'
              }`}
            >
              {cat.label}
            </button>
          ))}
        </div>

        {/* 方案4：横向滚动精选 + 双列列表 */}
        <div className="space-y-8">
          <div className="hidden md:block">
            <div className="flex items-center justify-between mb-4">
              <h3 className="text-lg font-bold text-slate-900 flex items-center gap-2">
                <Icons.Sparkles /> 本周精选
              </h3>
              <span className="text-xs text-slate-400">左右滑动查看更多</span>
            </div>
            <div 
              className="flex gap-5 overflow-x-auto pb-4 snap-x snap-mandatory"
              style={{ scrollbarWidth: 'thin', scrollbarColor: '#cbd5e1 transparent' }}
            >
              {featuredNotes.map(note => (
                <div key={note.id} className="w-[320px] flex-shrink-0 snap-start">
                  <NoteCard note={note} onClick={onOpenNote} />
                </div>
              ))}
            </div>
          </div>

          <div>
            <h3 className="text-lg font-bold text-slate-900 mb-4 hidden md:block">全部文章</h3>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              {displayedNotes.map(note => (
                <div key={note.id} className="slide-up">
                  <NoteCard note={note} onClick={onOpenNote} />
                </div>
              ))}
            </div>
          </div>

          {loading && (
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              {[1,2].map(i => (
                <div key={i} className="rounded-2xl border border-slate-200/80 bg-white overflow-hidden">
                  <div className="h-48 bg-slate-100 animate-pulse" />
                  <div className="p-5 space-y-3">
                    <div className="h-5 bg-slate-100 rounded animate-pulse" />
                    <div className="h-4 bg-slate-100 rounded w-3/4 animate-pulse" />
                    <div className="flex gap-2">
                      <div className="h-5 w-12 bg-slate-100 rounded-full animate-pulse" />
                      <div className="h-5 w-14 bg-slate-100 rounded-full animate-pulse" />
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}

          <div ref={loadMoreRef} className="h-10" />

          {!hasMore && displayedNotes.length > 0 && (
            <div className="text-center py-8 text-sm text-slate-400">— 已经到底了 —</div>
          )}
          {!loading && displayedNotes.length === 0 && (
            <div className="text-center py-20">
              <div className="w-20 h-20 mx-auto mb-4 rounded-full bg-slate-100 flex items-center justify-center">
                <svg className="w-10 h-10 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
                </svg>
              </div>
              <p className="text-slate-500 text-lg font-medium">暂无笔记</p>
              <p className="text-slate-400 text-sm mt-1">换个分类试试吧</p>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function NoteDetail({ note, isUnlocked, onBack, onShowUnlock }) {
  const relatedNotes = mockNotes.filter(n => n.id !== note.id && n.techCategory === note.techCategory).slice(0, 5);
  const contentLines = note.content.split('\n');
  const visibleLineCount = Math.ceil(contentLines.length * 0.4);
  const visibleContent = contentLines.slice(0, visibleLineCount).join('\n');

  return (
    <div className="min-h-screen bg-gradient-to-br from-slate-50 via-white to-slate-50">
      <header className="sticky top-0 z-30 bg-white/80 backdrop-blur-xl border-b border-slate-200/60">
        <div className="max-w-6xl mx-auto px-4 sm:px-6 py-3 flex items-center gap-4">
          <button onClick={onBack} className="flex items-center gap-2 text-sm text-slate-500 hover:text-slate-900 transition-colors">
            <Icons.ArrowLeft /> 返回列表
          </button>
          <h1 className="text-sm font-medium text-slate-900 truncate">{note.title}</h1>
        </div>
      </header>

      <div className="max-w-6xl mx-auto px-4 sm:px-6 py-8">
        <div className="flex gap-8">
          <aside className="hidden lg:block w-56 flex-shrink-0">
            <div className="sticky top-20 space-y-6">
              <div>
                <h3 className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">笔记分类</h3>
                <nav className="space-y-1">
                  {techCategories.filter(c => c.value !== '全部').map(cat => (
                    <button key={cat.value} className="block w-full text-left px-3 py-1.5 text-sm rounded-lg text-slate-500 hover:bg-slate-100 hover:text-slate-900 transition-colors">
                      {cat.label}
                    </button>
                  ))}
                </nav>
              </div>
              {relatedNotes.length > 0 && (
                <div>
                  <h3 className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">相关推荐</h3>
                  <div className="space-y-2">
                    {relatedNotes.map(n => (
                      <div key={n.id} className="text-sm text-slate-500 hover:text-emerald-600 cursor-pointer transition-colors leading-snug py-1">
                        <span className="line-clamp-1 font-medium">{n.title}</span>
                        <span className="text-xs text-slate-400">{n.createdAt}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </aside>

          <main className="flex-1 min-w-0">
            <div className="flex items-center flex-wrap gap-2 mb-4">
              {note.tags.map(tag => (
                <span key={tag.label} className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${tag.color}`}>
                  {tag.label}
                </span>
              ))}
            </div>

            <h1 className="text-3xl font-bold text-slate-900 mb-4">{note.title}</h1>

            <div className="flex items-center gap-4 text-sm text-slate-400 mb-6">
              <span className="flex items-center gap-1"><Icons.Eye /> {formatViewCount(note.viewCount)} 阅读</span>
              <span>{note.author}</span>
              <span>{note.createdAt}</span>
            </div>

            <img src={note.coverImage} alt={note.title} className="w-full h-64 object-cover rounded-2xl mb-8 shadow-lg" />

            <div className="relative">
              {isUnlocked ? (
                <div className="md-body" dangerouslySetInnerHTML={renderMarkdown(note.content)} />
              ) : (
                <div>
                  <div className="lock-mask">
                    <div className="md-body" dangerouslySetInnerHTML={renderMarkdown(visibleContent)} />
                  </div>
                  <div className="relative z-10 flex flex-col items-center justify-center py-16 mt-4">
                    <div className="w-16 h-16 rounded-full bg-gradient-to-br from-emerald-100 to-teal-100 flex items-center justify-center mb-4 shadow-lg pulse-glow">
                      <Icons.Lock />
                    </div>
                    <h3 className="text-lg font-semibold text-slate-900 mb-2">内容已锁定</h3>
                    <p className="text-sm text-slate-500 mb-6 text-center max-w-md">

                    </p>
                    <button
                      onClick={onShowUnlock}
                      className="flex items-center gap-2 bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white shadow-lg shadow-emerald-500/25 hover:shadow-emerald-500/40 transition-all duration-300 px-8 py-2.5 rounded-xl text-sm font-medium"

                      <Icons.LockSmall /> 阅读全文

          </main>
        </div>
      </div>
    </div>

function UnlockModal({ show, onClose, onUnlock }) {
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [isShaking, setIsShaking] = useState(false);
  const [isSuccess, setIsSuccess] = useState(false);

  if (!show) return null;

  const handleSubmit = () => {
    if (password.trim() === CORRECT_PASSWORD) {
      setIsSuccess(true);
      setTimeout(() => {
        onUnlock();
        setPassword('');
        setError('');
        setIsSuccess(false);
      }, 1500);
    } else {
      setError('口令不正确，请重新输入');
      setIsShaking(true);
      setTimeout(() => setIsShaking(false), 500);
    }
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter') handleSubmit();
  };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center" onClick={onClose}>
      <div className="absolute inset-0 bg-black/50 backdrop-blur-sm" />
      <div className={`relative bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 overflow-hidden fade-in ${isShaking ? 'animate-shake' : ''}`} onClick={e => e.stopPropagation()}>
        <div className="relative bg-gradient-to-br from-emerald-500 via-teal-500 to-cyan-500 px-6 py-8 text-center">
          <div className="absolute inset-0 opacity-10" style={{backgroundImage:'url("data:image/svg+xml,%3Csvg width=\'60\' height=\'60\' viewBox=\'0 0 60 60\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cg fill=\'none\' fill-rule=\'evenodd\'%3E%3Cg fill=\'%23ffffff\' fill-opacity=\'0.4\'%3E%3Cpath d=\'M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z\'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")'}} />
          <div className="relative">
            <div className="w-16 h-16 mx-auto mb-3 bg-white/20 rounded-2xl flex items-center justify-center backdrop-blur-sm">
              <Icons.QrCode />
            </div>
            <h2 className="text-xl font-bold text-white">解锁全文</h2>
            <p className="text-emerald-100 text-sm mt-1">扫描下方二维码关注公众号，获取口令</p>
          </div>
        </div>

        <div className="p-6 space-y-5">
          <div className="flex items-center gap-3 text-sm">
            <div className="flex items-center justify-center w-6 h-6 rounded-full bg-emerald-100 text-emerald-700 font-bold text-xs">1</div>
            <span className="text-slate-600">扫描二维码关注公众号</span>
          </div>
          <div className="flex items-center gap-3 text-sm">
            <div className="flex items-center justify-center w-6 h-6 rounded-full bg-emerald-100 text-emerald-700 font-bold text-xs">2</div>
            <span className="text-slate-600">在公众号内回复「<strong>解锁</strong>」获取口令</span>
          </div>
          <div className="flex items-center gap-3 text-sm">
            <div className="flex items-center justify-center w-6 h-6 rounded-full bg-emerald-100 text-emerald-700 font-bold text-xs">3</div>
            <span className="text-slate-600">输入口令解锁全站文章</span>
          </div>

          <div>
            <label className="block text-sm font-medium text-slate-700 mb-2">输入口令</label>
            <input
              type="text"
              value={password}
              onChange={e => { setPassword(e.target.value); setError(''); }}
              onKeyDown={handleKeyDown}
              placeholder="请输入口令"
              className="w-full h-11 px-4 rounded-xl border border-slate-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 outline-none text-center text-lg tracking-widest font-mono transition-all"
            />
            {error && (
              <p className="text-sm text-red-500 flex items-center gap-1 mt-2">
                <Icons.X /> {error}
              </p>
            )}
          </div>

          <button
            onClick={handleSubmit}
            disabled={!password.trim() || isSuccess}
            className={`w-full h-11 rounded-xl text-sm font-medium transition-all duration-300 flex items-center justify-center gap-2 ${
              isSuccess
                ? 'bg-emerald-500 text-white'
                : 'bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white shadow-lg shadow-emerald-500/25 hover:shadow-emerald-500/40'
            }`}
          >
            {isSuccess ? <><Icons.ShieldCheck /> 解锁成功！</> : <><Icons.KeyRound /> 验证并解锁</>}
          </button>

          <p className="text-xs text-center text-slate-400">
            解锁后可阅读全站所有文章 · 演示口令: tech2025
          </p>
        </div>

        <button onClick={onClose} className="absolute top-3 right-3 w-8 h-8 rounded-full bg-white/20 hover:bg-white/30 flex items-center justify-center text-white transition-colors">
          <Icons.X />
        </button>
      </div>
    </div>
  );
}

function App() {
  const [selectedNote, setSelectedNote] = useState(null);
  const [isUnlocked, setIsUnlocked] = useState(false);
  const [showUnlock, setShowUnlock] = useState(false);

  const handleOpenNote = (note) => {
    setSelectedNote(note);
    window.scrollTo(0, 0);
  };

  const handleBack = () => {
    setSelectedNote(null);
    window.scrollTo(0, 0);
  };

  return (
    <div>
      {selectedNote ? (
        <NoteDetail
          note={selectedNote}
          isUnlocked={isUnlocked}
          onBack={handleBack}
          onShowUnlock={() => setShowUnlock(true)}
        />
      ) : (
        <NoteList onOpenNote={handleOpenNote} />
      )}
      <UnlockModal
        show={showUnlock}
        onClose={() => setShowUnlock(false)}
        onUnlock={() => { setIsUnlocked(true); setShowUnlock(false); }}
      />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
