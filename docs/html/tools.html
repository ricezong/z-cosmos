<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自助区 · 冰巨星</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #0a1a28 0%, #0d2438 50%, #0a1a28 100%);
    color: #d0e8f5;
    min-height: 100vh;
}
.star-bg {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
    background-image:
        radial-gradient(2px 2px at 25px 35px, rgba(159,197,232,0.2), transparent),
        radial-gradient(1px 1px at 85px 75px, rgba(106,176,214,0.15), transparent),
        radial-gradient(2px 2px at 155px 105px, rgba(159,197,232,0.2), transparent),
        radial-gradient(1px 1px at 255px 45px, rgba(200,220,240,0.1), transparent);
}
.container { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 30px 20px; }

.header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 30px; padding-bottom: 20px;
    border-bottom: 1px solid rgba(106,176,214,0.3);
}
.header-left { display: flex; align-items: center; gap: 15px; }
.planet-icon {
    width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(135deg, #6ab0d6, #9fc5e8);
    box-shadow: 0 0 20px rgba(106,176,214,0.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
}
.header-title h1 {
    font-size: 1.8rem; font-weight: 300; letter-spacing: 4px;
    background: linear-gradient(135deg, #6ab0d6, #c8e0f5);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header-title p { font-size: 0.85rem; opacity: 0.7; margin-top: 2px; }
.back-btn {
    padding: 8px 20px; border-radius: 30px;
    background: rgba(106,176,214,0.2); border: 1px solid rgba(106,176,214,0.4);
    color: #c8e0f5; cursor: pointer; text-decoration: none;
    transition: 0.3s; font-size: 0.9rem;
}
.back-btn:hover {
    background: rgba(106,176,214,0.35); box-shadow: 0 0 15px rgba(106,176,214,0.3);
}

/* Tool Menu */
.tool-menu {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px; margin-bottom: 30px;
}
.tool-card {
    background: rgba(10,30,50,0.5); border: 1px solid rgba(106,176,214,0.2);
    border-radius: 16px; padding: 20px 15px; text-align: center;
    cursor: pointer; transition: 0.3s;
}
.tool-card:hover, .tool-card.active {
    border-color: rgba(106,176,214,0.5);
    box-shadow: 0 5px 20px rgba(106,176,214,0.15);
    background: rgba(10,30,50,0.7);
    transform: translateY(-3px);
}
.tool-card .icon { font-size: 2rem; margin-bottom: 10px; }
.tool-card .name { font-size: 0.9rem; color: #c8e0f5; }

/* Tool Panel */
.tool-panel { display: none; }
.tool-panel.active { display: block; }
.tool-box {
    background: rgba(10,30,50,0.6); border: 1px solid rgba(106,176,214,0.25);
    border-radius: 20px; padding: 25px;
    backdrop-filter: blur(10px);
}
.tool-box h3 {
    font-weight: 400; margin-bottom: 20px; color: #9fc5e8;
    letter-spacing: 2px; font-size: 1.2rem;
}

/* Notepad */
.note-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
.note-item {
    background: rgba(106,176,214,0.15); border: 1px solid rgba(106,176,214,0.3);
    border-radius: 14px; padding: 15px; position: relative;
}
.note-item textarea {
    width: 100%; min-height: 100px; background: transparent; border: none;
    color: #d0e8f5; font-family: inherit; resize: vertical; outline: none;
    font-size: 0.9rem; line-height: 1.5;
}
.note-item .note-time { font-size: 0.75rem; opacity: 0.5; margin-top: 8px; }
.note-item .note-del {
    position: absolute; top: 8px; right: 12px; cursor: pointer;
    opacity: 0.5; font-size: 1.1rem; transition: 0.3s;
}
.note-item .note-del:hover { opacity: 1; color: #ff9999; }
.add-note-btn {
    padding: 12px 28px; border-radius: 30px; border: none; margin-top: 20px;
    background: linear-gradient(135deg, #6ab0d6, #9fc5e8);
    color: white; cursor: pointer; font-size: 0.9rem; transition: 0.3s;
}
.add-note-btn:hover { box-shadow: 0 0 20px rgba(106,176,214,0.4); }

/* Canvas Draw */
.draw-canvas {
    background: #0a1520; border-radius: 12px; border: 2px solid rgba(106,176,214,0.3);
    cursor: crosshair; display: block; margin-bottom: 15px;
}
.draw-tools { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 15px; }
.draw-tools label { font-size: 0.85rem; opacity: 0.8; }
.draw-tools input[type="color"] {
    width: 40px; height: 40px; border: none; border-radius: 8px;
    background: none; cursor: pointer;
}
.draw-tools input[type="range"] { width: 120px; }
.draw-tools button {
    padding: 8px 18px; border-radius: 20px; border: 1px solid rgba(106,176,214,0.3);
    background: rgba(106,176,214,0.15); color: #c8e0f5; cursor: pointer; transition: 0.3s;
}
.draw-tools button:hover { background: rgba(106,176,214,0.3); }

/* Calculator */
.calc-display {
    background: rgba(5,15,25,0.7); border: 1px solid rgba(106,176,214,0.3);
    border-radius: 16px; padding: 20px; margin-bottom: 15px;
    text-align: right; font-size: 1.8rem; color: #d0e8f5;
    min-height: 70px; word-break: break-all;
}
.calc-history { font-size: 0.9rem; opacity: 0.5; min-height: 20px; margin-bottom: 5px; }
.calc-btns {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
}
.calc-btn {
    padding: 18px; border-radius: 14px; border: none;
    background: rgba(106,176,214,0.15); color: #d0e8f5;
    font-size: 1.1rem; cursor: pointer; transition: 0.2s;
}
.calc-btn:hover { background: rgba(106,176,214,0.3); }
.calc-btn.op { background: rgba(106,176,214,0.25); color: #9fc5e8; }
.calc-btn.op:hover { background: rgba(106,176,214,0.4); }
.calc-btn.eq {
    background: linear-gradient(135deg, #6ab0d6, #9fc5e8);
    color: white; grid-column: span 2;
}
.calc-btn.eq:hover { box-shadow: 0 0 15px rgba(106,176,214,0.4); }
.calc-btn.clear { background: rgba(192,80,80,0.2); color: #ffaaaa; }
.calc-btn.clear:hover { background: rgba(192,80,80,0.35); }

/* Timer */
.timer-display {
    text-align: center; font-size: 4rem; font-weight: 300;
    color: #9fc5e8; margin: 30px 0; letter-spacing: 4px;
    font-family: 'Courier New', monospace;
}
.timer-btns { display: flex; gap: 15px; justify-content: center; margin-bottom: 25px; }
.timer-inputs { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
.timer-inputs input {
    width: 70px; padding: 12px; border-radius: 12px;
    background: rgba(5,15,25,0.6); border: 1px solid rgba(106,176,214,0.3);
    color: #d0e8f5; font-size: 1.2rem; text-align: center; outline: none;
}

/* Text Tool */
.text-area-box {
    width: 100%; min-height: 180px; padding: 15px; border-radius: 14px;
    background: rgba(5,15,25,0.6); border: 1px solid rgba(106,176,214,0.3);
    color: #d0e8f5; font-family: inherit; font-size: 0.95rem;
    outline: none; resize: vertical; margin-bottom: 15px;
}
.text-stats {
    display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px;
    font-size: 0.9rem;
}
.text-stat-item {
    background: rgba(106,176,214,0.15); padding: 8px 16px;
    border-radius: 12px; border: 1px solid rgba(106,176,214,0.2);
}
.text-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
.text-actions button {
    padding: 10px 20px; border-radius: 30px; border: 1px solid rgba(106,176,214,0.3);
    background: rgba(106,176,214,0.15); color: #c8e0f5; cursor: pointer;
    transition: 0.3s; font-size: 0.85rem;
}
.text-actions button:hover { background: rgba(106,176,214,0.3); }

/* Color Tool */
.color-preview {
    width: 100%; height: 120px; border-radius: 16px;
    background: #6ab0d6; margin-bottom: 20px;
    border: 2px solid rgba(106,176,214,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; color: rgba(0,0,0,0.6); font-weight: bold;
    letter-spacing: 1px;
}
.color-sliders { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
.color-slider-row { display: flex; align-items: center; gap: 15px; }
.color-slider-row label { width: 30px; font-size: 0.9rem; }
.color-slider-row input[type="range"] { flex: 1; }
.color-slider-row span { width: 60px; font-size: 0.9rem; text-align: right; font-family: monospace; }
.color-output {
    background: rgba(5,15,25,0.6); border-radius: 14px; padding: 15px;
    font-family: monospace; font-size: 0.95rem; line-height: 1.8;
}
</style>
</head>
<body>
<div class="star-bg"></div>
<div class="container">
    <div class="header">
        <div class="header-left">
            <div class="planet-icon">❄️</div>
            <div class="header-title">
                <h1>自助区</h1>
                <p>冰巨星 · 工具集合中心</p>
            </div>
        </div>
        <a href="index.html" class="back-btn">← 返回星域</a>
    </div>

    <!-- Tool Menu -->
    <div class="tool-menu">
        <div class="tool-card active" onclick="switchTool('notepad')">
            <div class="icon">📝</div>
            <div class="name">便签</div>
        </div>
        <div class="tool-card" onclick="switchTool('draw')">
            <div class="icon">🎨</div>
            <div class="name">画板</div>
        </div>
        <div class="tool-card" onclick="switchTool('calc')">
            <div class="icon">🧮</div>
            <div class="name">计算器</div>
        </div>
        <div class="tool-card" onclick="switchTool('timer')">
            <div class="icon">⏱️</div>
            <div class="name">计时器</div>
        </div>
        <div class="tool-card" onclick="switchTool('color')">
            <div class="icon">🎨</div>
            <div class="name">颜色工具</div>
        </div>
        <div class="tool-card" onclick="switchTool('text')">
            <div class="icon">📄</div>
            <div class="name">文本工具</div>
        </div>
    </div>

    <!-- Notepad -->
    <div id="tool-notepad" class="tool-panel active">
        <div class="tool-box">
            <h3>📝 便签板</h3>
            <div class="note-grid" id="note-grid"></div>
            <button class="add-note-btn" onclick="addNote()">+ 添加便签</button>
        </div>
    </div>

    <!-- Draw -->
    <div id="tool-draw" class="tool-panel">
        <div class="tool-box">
            <h3>🎨 涂鸦画板</h3>
            <div class="draw-tools">
                <label>颜色:</label>
                <input type="color" id="draw-color" value="#6ab0d6">
                <label>粗细:</label>
                <input type="range" id="draw-size" min="1" max="20" value="3">
                <span id="draw-size-val">3</span>
                <button onclick="clearCanvas()">清空</button>
                <button onclick="saveCanvas()">保存</button>
            </div>
            <div style="overflow:auto;">
                <canvas id="draw-canvas" class="draw-canvas" width="900" height="400"></canvas>
            </div>
        </div>
    </div>

    <!-- Calculator -->
    <div id="tool-calc" class="tool-panel">
        <div class="tool-box">
            <h3>🧮 计算器</h3>
            <div class="calc-display">
                <div class="calc-history" id="calc-history"></div>
                <div id="calc-display">0</div>
            </div>
            <div class="calc-btns">
                <button class="calc-btn clear" onclick="calcClear()">C</button>
                <button class="calc-btn op" onclick="calcOp('/')">÷</button>
                <button class="calc-btn op" onclick="calcOp('*')">×</button>
                <button class="calc-btn op" onclick="calcBack()">⌫</button>
                <button class="calc-btn" onclick="calcNum('7')">7</button>
                <button class="calc-btn" onclick="calcNum('8')">8</button>
                <button class="calc-btn" onclick="calcNum('9')">9</button>
                <button class="calc-btn op" onclick="calcOp('-')">−</button>
                <button class="calc-btn" onclick="calcNum('4')">4</button>
                <button class="calc-btn" onclick="calcNum('5')">5</button>
                <button class="calc-btn" onclick="calcNum('6')">6</button>
                <button class="calc-btn op" onclick="calcOp('+')">+</button>
                <button class="calc-btn" onclick="calcNum('1')">1</button>
                <button class="calc-btn" onclick="calcNum('2')">2</button>
                <button class="calc-btn" onclick="calcNum('3')">3</button>
                <button class="calc-btn eq" onclick="calcEq()">=</button>
                <button class="calc-btn" onclick="calcNum('0')" style="grid-column:span 2">0</button>
                <button class="calc-btn" onclick="calcNum('.')">.</button>
            </div>
        </div>
    </div>

    <!-- Timer -->
    <div id="tool-timer" class="tool-panel">
        <div class="tool-box">
            <h3>⏱️ 计时器</h3>
            <div class="timer-inputs">
                <input type="number" id="tm-min" placeholder="分" min="0" max="99" value="5">
                <input type="number" id="tm-sec" placeholder="秒" min="0" max="59" value="0">
            </div>
            <div class="timer-display" id="timer-display">05:00</div>
            <div class="timer-btns">
                <button class="add-note-btn" onclick="startTimer()">▶ 开始</button>
                <button class="add-note-btn" style="background:rgba(106,176,214,0.2)" onclick="pauseTimer()">⏸ 暂停</button>
                <button class="add-note-btn" style="background:rgba(192,80,80,0.3)" onclick="resetTimer()">↺ 重置</button>
            </div>
        </div>
    </div>

    <!-- Color Tool -->
    <div id="tool-color" class="tool-panel">
        <div class="tool-box">
            <h3>🎨 颜色工具</h3>
            <div class="color-preview" id="color-preview">#6AB0D6</div>
            <div class="color-sliders">
                <div class="color-slider-row">
                    <label>R</label>
                    <input type="range" id="col-r" min="0" max="255" value="106" oninput="updateColor()">
                    <span id="val-r">106</span>
                </div>
                <div class="color-slider-row">
                    <label>G</label>
                    <input type="range" id="col-g" min="0" max="255" value="176" oninput="updateColor()">
                    <span id="val-g">176</span>
                </div>
                <div class="color-slider-row">
                    <label>B</label>
                    <input type="range" id="col-b" min="0" max="255" value="214" oninput="updateColor()">
                    <span id="val-b">214</span>
                </div>
            </div>
            <div class="color-output" id="color-output"></div>
        </div>
    </div>

    <!-- Text Tool -->
    <div id="tool-text" class="tool-panel">
        <div class="tool-box">
            <h3>📄 文本工具</h3>
            <textarea class="text-area-box" id="text-input" placeholder="在这里输入或粘贴文本..."></textarea>
            <div class="text-stats" id="text-stats">
                <div class="text-stat-item">字符: 0</div>
                <div class="text-stat-item">字数: 0</div>
                <div class="text-stat-item">行数: 0</div>
                <div class="text-stat-item">英文: 0</div>
                <div class="text-stat-item">数字: 0</div>
            </div>
            <div class="text-actions">
                <button onclick="textToUpper()">转大写</button>
                <button onclick="textToLower()">转小写</button>
                <button onclick="textRemoveSpace()">去空格</button>
                <button onclick="textRemoveLine()">去换行</button>
                <button onclick="textReverse()">反转</button>
                <button onclick="textCopy()">复制</button>
                <button onclick="textClear()">清空</button>
            </div>
        </div>
    </div>
</div>

<script>
// ===== Tool Switching =====
function switchTool(tool) {
    document.querySelectorAll('.tool-card').forEach(c => c.classList.remove('active'));
    event.currentTarget.classList.add('active');
    document.querySelectorAll('.tool-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tool-' + tool).classList.add('active');
}

// ===== Notepad =====
const NOTES_KEY = 'cosmos_tools_notes';
function getNotes() {
    try { return JSON.parse(localStorage.getItem(NOTES_KEY)) || []; }
    catch { return []; }
}
function saveNotes(notes) { localStorage.setItem(NOTES_KEY, JSON.stringify(notes)); }

function renderNotes() {
    const grid = document.getElementById('note-grid');
    const notes = getNotes();
    if (notes.length === 0) {
        grid.innerHTML = '<div style="opacity:0.5;padding:20px">暂无便签，点击添加</div>';
        return;
    }
    grid.innerHTML = notes.map((n, i) => `
        <div class="note-item">
            <span class="note-del" onclick="deleteNote(${i})">×</span>
            <textarea onchange="updateNote(${i}, this.value)" placeholder="写点什么...">${n.text}</textarea>
            <div class="note-time">${new Date(n.time).toLocaleString()}</div>
        </div>
    `).join('');
}
function addNote() {
    const notes = getNotes();
    notes.unshift({ text: '', time: Date.now() });
    saveNotes(notes);
    renderNotes();
}
function updateNote(i, text) {
    const notes = getNotes();
    notes[i].text = text;
    notes[i].time = Date.now();
    saveNotes(notes);
}
function deleteNote(i) {
    const notes = getNotes();
    notes.splice(i, 1);
    saveNotes(notes);
    renderNotes();
}
renderNotes();

// ===== Draw Canvas =====
const dCanvas = document.getElementById('draw-canvas');
const dCtx = dCanvas.getContext('2d');
let drawing = false;
let lastX = 0, lastY = 0;

dCanvas.addEventListener('mousedown', e => {
    drawing = true;
    [lastX, lastY] = [e.offsetX, e.offsetY];
});
dCanvas.addEventListener('mousemove', e => {
    if (!drawing) return;
    dCtx.strokeStyle = document.getElementById('draw-color').value;
    dCtx.lineWidth = document.getElementById('draw-size').value;
    dCtx.lineCap = 'round';
    dCtx.beginPath();
    dCtx.moveTo(lastX, lastY);
    dCtx.lineTo(e.offsetX, e.offsetY);
    dCtx.stroke();
    [lastX, lastY] = [e.offsetX, e.offsetY];
});
window.addEventListener('mouseup', () => drawing = false);

document.getElementById('draw-size').addEventListener('input', e => {
    document.getElementById('draw-size-val').textContent = e.target.value;
});

function clearCanvas() {
    dCtx.fillStyle = '#0a1520';
    dCtx.fillRect(0, 0, dCanvas.width, dCanvas.height);
}
function saveCanvas() {
    const link = document.createElement('a');
    link.download = 'drawing.png';
    link.href = dCanvas.toDataURL();
    link.click();
}
clearCanvas();

// ===== Calculator =====
let calcExpr = '';
let calcLast = '';
function calcDisplay() {
    document.getElementById('calc-display').textContent = calcExpr || '0';
    document.getElementById('calc-history').textContent = calcLast;
}
function calcNum(n) {
    calcExpr += n;
    calcDisplay();
}
function calcOp(op) {
    if (calcExpr && !/[+\-*/.]$/.test(calcExpr)) {
        calcExpr += op;
        calcDisplay();
    }
}
function calcClear() { calcExpr = ''; calcLast = ''; calcDisplay(); }
function calcBack() { calcExpr = calcExpr.slice(0, -1); calcDisplay(); }
function calcEq() {
    try {
        const res = Function('"use strict"; return (' + calcExpr + ')')();
        calcLast = calcExpr + ' = ' + res;
        calcExpr = String(res);
        calcDisplay();
    } catch {
        calcExpr = 'Error';
        calcDisplay();
        setTimeout(() => { calcExpr = ''; calcDisplay(); }, 1000);
    }
}

// ===== Timer =====
let timerId = null;
let timerSeconds = 300;
let timerRunning = false;
function formatTimer(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}
function updateTimerDisplay() {
    document.getElementById('timer-display').textContent = formatTimer(timerSeconds);
}
function startTimer() {
    if (timerRunning) return;
    if (!timerId) {
        const m = parseInt(document.getElementById('tm-min').value) || 0;
        const s = parseInt(document.getElementById('tm-sec').value) || 0;
        timerSeconds = m * 60 + s;
    }
    if (timerSeconds <= 0) return;
    timerRunning = true;
    timerId = setInterval(() => {
        timerSeconds--;
        updateTimerDisplay();
        if (timerSeconds <= 0) {
            clearInterval(timerId);
            timerRunning = false;
            timerId = null;
            alert('⏰ 时间到！');
        }
    }, 1000);
}
function pauseTimer() {
    if (!timerRunning) return;
    clearInterval(timerId);
    timerRunning = false;
}
function resetTimer() {
    clearInterval(timerId);
    timerRunning = false;
    timerId = null;
    const m = parseInt(document.getElementById('tm-min').value) || 0;
    const s = parseInt(document.getElementById('tm-sec').value) || 0;
    timerSeconds = m * 60 + s;
    updateTimerDisplay();
}

// ===== Color Tool =====
function rgbToHex(r, g, b) {
    return '#' + [r, g, b].map(x => x.toString(16).padStart(2,'0')).join('').toUpperCase();
}
function updateColor() {
    const r = parseInt(document.getElementById('col-r').value);
    const g = parseInt(document.getElementById('col-g').value);
    const b = parseInt(document.getElementById('col-b').value);
    document.getElementById('val-r').textContent = r;
    document.getElementById('val-g').textContent = g;
    document.getElementById('val-b').textContent = b;
    const hex = rgbToHex(r, g, b);
    const preview = document.getElementById('color-preview');
    preview.style.background = hex;
    preview.textContent = hex;
    // brightness check for text color
    const brightness = (r * 299 + g * 587 + b * 114) / 1000;
    preview.style.color = brightness > 128 ? 'rgba(0,0,0,0.6)' : 'rgba(255,255,255,0.8)';

    // Output formats
    document.getElementById('color-output').innerHTML = `
        HEX: ${hex}<br>
        RGB: rgb(${r}, ${g}, ${b})<br>
        RGBA: rgba(${r}, ${g}, ${b}, 1.0)<br>
        HSL: hsl(${Math.round((Math.atan2(Math.sqrt(3)*(g-b), 2*r-g-b)*180/Math.PI+360)%360)}, ${Math.round((1-Math.min(r,g,b)/Math.max(r,g,b))*100)}%, ${Math.round((Math.max(r,g,b)+Math.min(r,g,b))/2/255*100)}%)
    `;
}
updateColor();

// ===== Text Tool =====
const textInput = document.getElementById('text-input');
function updateTextStats() {
    const text = textInput.value;
    const chars = text.length;
    const words = text.trim() ? text.trim().split(/\s+/).length : 0;
    const lines = text ? text.split('\n').length : 0;
    const english = (text.match(/[a-zA-Z]/g) || []).length;
    const digits = (text.match(/[0-9]/g) || []).length;
    document.getElementById('text-stats').innerHTML = `
        <div class="text-stat-item">字符: ${chars}</div>
        <div class="text-stat-item">字数: ${words}</div>
        <div class="text-stat-item">行数: ${lines}</div>
        <div class="text-stat-item">英文: ${english}</div>
        <div class="text-stat-item">数字: ${digits}</div>
    `;
}
textInput.addEventListener('input', updateTextStats);

function textToUpper() { textInput.value = textInput.value.toUpperCase(); updateTextStats(); }
function textToLower() { textInput.value = textInput.value.toLowerCase(); updateTextStats(); }
function textRemoveSpace() { textInput.value = textInput.value.replace(/\s/g, ''); updateTextStats(); }
function textRemoveLine() { textInput.value = textInput.value.replace(/\n/g, ''); updateTextStats(); }
function textReverse() { textInput.value = textInput.value.split('').reverse().join(''); }
function textCopy() { textInput.select(); document.execCommand('copy'); alert('已复制到剪贴板'); }
function textClear() { textInput.value = ''; updateTextStats(); }
</script>
</body>
</html>
