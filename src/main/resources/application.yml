# 服务端口
server:
  port: 8080

spring:
  application:
    name: z-cosmos

  ai:
    deepseek:
      chat:
        api-key: sk-1ffa55ae66********************

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 100MB

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/z-cosmos?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: user
    password: pwd
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 600000
      connection-timeout: 30000
      max-lifetime: 1800000

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 1000ms


  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false


# MyBatis Plus配置
mybatis-plus:
  #mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package:
    - cn.kong.cosmos.auth.entity
    - cn.kong.cosmos.biz.note.entity
    - cn.kong.cosmos.biz.hot.entity
    - cn.kong.cosmos.biz.search.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 备案信息配置
site:
  icp-number: ${ICP_NUMBER:京ICP备XXXXXXXX号}
  police-number: ${POLICE_NUMBER:京公网安备 XXXXXXXXX号}
  copyright: ${COPYRIGHT:© 2026 Z-Cosmos}
  contact-email: ${CONTACT_EMAIL:contact@example.com}

# 微信公众号配置（生产环境通过环境变量注入）
wechat:
  mp:
    app-id: ${WECHAT_MP_APP_ID:}
    secret: ${WECHAT_MP_SECRET:}
    token: ${WECHAT_MP_TOKEN:}
    aes-key: ${WECHAT_MP_AES_KEY:}

# IP 限流配置
rate-limit:
  window-seconds: 60
  max-requests: 10

# 本地文件存储配置
storage:
  local:
    root: ${STORAGE_LOCAL_ROOT:./uploads}      # 物理存储根目录
    url-prefix: /uploads                        # HTTP 访问前缀（需放行）

# 日志配置
logging:
  level:
    root: INFO
    cn.kong.cosmos: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

