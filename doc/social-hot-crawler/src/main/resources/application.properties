# ============================================
# 社交媒体热点爬虫 - 应用配置
# ============================================

server.port=8081

# SQLite
spring.datasource.url=jdbc:sqlite:./data/social_hot.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# 文件上传
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 日志
logging.level.com.social.crawler=DEBUG
logging.level.org.hibernate.SQL=WARN

# ============================================
# 平台适配器配置（可扩展）
# ============================================
# 是否启用各平台（true/false）
crawler.platform.douyin.enabled=true
crawler.platform.xiaohongshu.enabled=true
crawler.platform.zhihu.enabled=true
crawler.platform.bilibili.enabled=true
crawler.platform.weibo.enabled=true

# 爬取间隔（秒）- 避免请求过于频繁
crawler.interval.hot-topics=300
crawler.interval.comments=60

# 每次爬取的最大数量
crawler.max-topics-per-fetch=50
crawler.max-comments-per-topic=100
crawler.max-comment-depth=3
