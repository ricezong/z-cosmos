<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>星际漫游 · 星球交互</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            color: white;
            background-color: black;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            pointer-events: none;
        }
        #info h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #ffffff, #aaccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(100,150,255,0.5);
        }
        #info p {
            margin: 5px 0 0;
            opacity: 0.8;
            font-size: 1rem;
            letter-spacing: 2px;
        }
        #hint {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 10;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            background: rgba(20,30,50,0.4);
            padding: 10px 20px;
            border-radius: 40px;
            backdrop-filter: blur(8px);
            border-left: 3px solid #6eb5ff;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #function-panel {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 20;
            width: 280px;
            background: rgba(10, 20, 40, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 20px 24px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(100,180,255,0.2) inset;
            color: #e0f0ff;
            transition: 0.3s;
            pointer-events: none;
        }
        #function-title {
            margin: 0 0 8px;
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 15px #3d9dff;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 8px;
        }
        #function-desc {
            margin: 10px 0 5px;
            font-size: 1rem;
            line-height: 1.5;
            opacity: 0.9;
        }
        #function-action {
            margin-top: 15px;
            display: inline-block;
            background: rgba(60, 140, 255, 0.3);
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.3);
            color: #bbddff;
            pointer-events: auto;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(5px);
        }
        #function-action:hover {
            background: rgba(60, 160, 255, 0.6);
            color: white;
            box-shadow: 0 0 15px #3d9dff;
        }
        #status-tip {
            position: absolute;
            top: 100px;
            right: 30px;
            z-index: 15;
            background: rgba(0,0,0,0.3);
            padding: 8px 18px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            font-size: 0.9rem;
            border: 1px solid rgba(255,215,100,0.5);
            color: #ffecb3;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .planet-tag {
            position: absolute;
            color: white;
            text-shadow: 0 0 10px black;
            font-weight: 500;
            pointer-events: none;
            z-index: 5;
            transform: translate(-50%, -50%);
        }
        canvas {
            display: block;
            cursor: grab;
        }
        canvas:active {
            cursor: grabbing;
        }
        .glow {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at 20% 30%, rgba(30,60,120,0.15) 0%, transparent 50%);
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div id="info">
        <h1>✨ COSMOS · 星域</h1>
        <p>拖动星球 · 碰撞 · 点击探索</p>
    </div>
    <div id="hint">
        ⚡ 拖拽星球与其他星球相撞 — 触发冲击波效果  |  单击星球跳转功能区
    </div>
    <div id="status-tip">💥 撞击效果!</div>
    
    <div id="function-panel">
        <div id="function-title">🌍 星际枢纽</div>
        <div id="function-desc">点击任意星球，探索不同领域</div>
        <div id="function-action">✨ 等待探索</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- 初始化场景、相机、渲染器 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const cssRenderer = new CSS2DRenderer();
        cssRenderer.setSize(window.innerWidth, window.innerHeight);
        cssRenderer.domElement.style.position = 'absolute';
        cssRenderer.domElement.style.top = '0px';
        cssRenderer.domElement.style.left = '0px';
        cssRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(cssRenderer.domElement);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 5, 18);
        camera.lookAt(0, 0, 0);

        // --- 光照 ---
        scene.add(new THREE.AmbientLight(0x404060, 0.5));
        const dirLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
        dirLight.position.set(5, 12, 8);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        const d = 15;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 30;
        dirLight.shadow.bias = -0.001;
        scene.add(dirLight);
        
        const fillLight1 = new THREE.PointLight(0x4466ff, 0.8);
        fillLight1.position.set(-3, 4, 6);
        scene.add(fillLight1);
        const fillLight2 = new THREE.PointLight(0xff9966, 0.5);
        fillLight2.position.set(6, 3, -4);
        scene.add(fillLight2);
        const backLight = new THREE.PointLight(0x3355aa, 0.6);
        backLight.position.set(-5, 0, -10);
        scene.add(backLight);

        // 星空粒子
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 3000;
        const starPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i+=3) {
            const r = 50 + Math.random() * 150;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            starPositions[i] = Math.sin(phi) * Math.cos(theta) * r;
            starPositions[i+1] = Math.sin(phi) * Math.sin(theta) * r;
            starPositions[i+2] = Math.cos(phi) * r;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({color: 0xffffff, size: 0.15, transparent: true});
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        scene.fog = new THREE.FogExp2(0x050b1a, 0.0035);
        
        const gridHelper = new THREE.GridHelper(30, 20, 0x3366aa, 0x224466);
        gridHelper.position.y = -2.5;
        scene.add(gridHelper);
        
        const glowSphere = new THREE.Mesh(
            new THREE.SphereGeometry(0.4, 16, 16),
            new THREE.MeshBasicMaterial({ color: 0x88aaff, transparent: true, opacity: 0.2 })
        );
        scene.add(glowSphere);

        // --- 工具：生成星球纹理 ---
        function createPlanetTexture(baseColor, secondaryColor, hasSpots = true, stripePattern = false) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            const gradient = ctx.createRadialGradient(256, 256, 0, 256, 256, 256);
            gradient.addColorStop(0, baseColor);
            gradient.addColorStop(0.5, secondaryColor);
            gradient.addColorStop(1, shadeColor(baseColor, -30));
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 512, 512);
            
            if (hasSpots) {
                for (let i = 0; i < 200; i++) {
                    const x = Math.random() * 512;
                    const y = Math.random() * 512;
                    const radius = 3 + Math.random() * 25;
                    const alpha = 0.1 + Math.random() * 0.3;
                    ctx.beginPath();
                    ctx.arc(x, y, radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(20, 20, 30, ${alpha})`;
                    ctx.fill();
                    
                    if (i % 3 === 0) {
                        ctx.beginPath();
                        ctx.arc(x-2, y-2, radius*0.3, 0, Math.PI*2);
                        ctx.fillStyle = `rgba(255, 255, 240, ${alpha*0.8})`;
                        ctx.fill();
                    }
                }
            }
            
            if (stripePattern) {
                ctx.strokeStyle = 'rgba(180, 140, 100, 0.5)';
                ctx.lineWidth = 18;
                for (let i = 0; i < 12; i++) {
                    const y = 50 + i * 40 + Math.sin(i) * 20;
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.bezierCurveTo(200, y-30, 300, y+40, 512, y-10);
                    ctx.stroke();
                }
            }
            
            const grad2 = ctx.createRadialGradient(256, 256, 200, 256, 256, 256);
            grad2.addColorStop(0, 'rgba(255,255,255,0)');
            grad2.addColorStop(0.8, 'rgba(200,220,255,0.15)');
            grad2.addColorStop(1, 'rgba(180,200,255,0.4)');
            ctx.fillStyle = grad2;
            ctx.fillRect(0, 0, 512, 512);
            
            return new THREE.CanvasTexture(canvas);
        }
        
        function shadeColor(col, percent) {
            let R = parseInt(col.substring(1,3),16);
            let G = parseInt(col.substring(3,5),16);
            let B = parseInt(col.substring(5,7),16);
            R = Math.min(255, Math.max(0, R + percent));
            G = Math.min(255, Math.max(0, G + percent));
            B = Math.min(255, Math.max(0, B + percent));
            return `#${((1 << 24) + (R << 16) + (G << 8) + B).toString(16).slice(1)}`;
        }

        // --- 创建星球 ---
        const planets = [];
        
        function createLabel(text, color = '#ffffff') {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.color = color;
            div.style.fontSize = '18px';
            div.style.fontWeight = 'bold';
            div.style.textShadow = '0 0 15px rgba(0,0,0,0.9)';
            div.style.background = 'rgba(20,30,50,0.6)';
            div.style.padding = '6px 16px';
            div.style.borderRadius = '30px';
            div.style.backdropFilter = 'blur(8px)';
            div.style.border = '1px solid rgba(255,255,255,0.25)';
            div.style.pointerEvents = 'none';
            div.style.letterSpacing = '1px';
            return new CSS2DObject(div);
        }

        // 地球 - 贴吧区
        const tex1 = createPlanetTexture('#3a7bd5', '#5fa3f0', true, false);
        const planet1 = new THREE.Mesh(new THREE.SphereGeometry(1.6, 64, 64), new THREE.MeshStandardMaterial({ map: tex1, roughness: 0.5, metalness: 0.1 }));
        planet1.castShadow = planet1.receiveShadow = true;
        planet1.userData = { name: '地球', func: '贴吧区', desc: '社区交流，发帖互动', link: 'tieba.html' };
        
        // 火星 - 剧场区
        const tex2 = createPlanetTexture('#c05c3e', '#d97a5c', true, false);
        const planet2 = new THREE.Mesh(new THREE.SphereGeometry(1.4, 64, 64), new THREE.MeshStandardMaterial({ map: tex2, roughness: 0.7 }));
        planet2.castShadow = planet2.receiveShadow = true;
        planet2.userData = { name: '火星', func: '剧场区', desc: '火柴人与像素剧场', link: 'theater.html' };
        
        // 木星 - 热点区
        const tex3 = createPlanetTexture('#d4b78c', '#b89a6e', true, true);
        const planet3 = new THREE.Mesh(new THREE.SphereGeometry(2.0, 64, 64), new THREE.MeshStandardMaterial({ map: tex3, roughness: 0.6 }));
        planet3.castShadow = planet3.receiveShadow = true;
        planet3.userData = { name: '木星', func: '热点区', desc: '每日热点新闻汇聚', link: 'hot.html' };
        
        // 冰巨星 - 自助区
        const tex4 = createPlanetTexture('#6ab0d6', '#9fc5e8', true, false);
        const planet4 = new THREE.Mesh(new THREE.SphereGeometry(1.5, 64, 64), new THREE.MeshStandardMaterial({ map: tex4, roughness: 0.3 }));
        planet4.castShadow = planet4.receiveShadow = true;
        planet4.userData = { name: '冰巨星', func: '自助区', desc: '自定义工具集合', link: 'tools.html' };
        
        // 紫微星 - 搜索区
        const tex5 = createPlanetTexture('#8a6db8', '#b095e0', true, false);
        const planet5 = new THREE.Mesh(new THREE.SphereGeometry(1.3, 64, 64), new THREE.MeshStandardMaterial({ map: tex5, roughness: 0.4 }));
        planet5.castShadow = planet5.receiveShadow = true;
        planet5.userData = { name: '紫微星', func: '搜索区', desc: '全站信息聚合搜索', link: 'search.html' };

        // 冰巨星环
        const ringGeo = new THREE.TorusGeometry(2.2, 0.15, 32, 200);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0xc8d9f0, transparent: true, opacity: 0.55, side: THREE.DoubleSide });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 2.8;
        ring.rotation.z = 0.3;
        planet4.add(ring);
        
        const ring2Geo = new THREE.TorusGeometry(2.5, 0.08, 16, 200);
        const ring2Mat = new THREE.MeshStandardMaterial({ color: 0xaaccff, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
        const ring2 = new THREE.Mesh(ring2Geo, ring2Mat);
        ring2.rotation.x = Math.PI / 2.5;
        ring2.rotation.z = -0.2;
        planet4.add(ring2);

        const planetMeshes = [planet1, planet2, planet3, planet4, planet5];
        
        planetMeshes.forEach((p, i) => {
            const angle = (i / planetMeshes.length) * Math.PI * 2;
            p.position.set(
                3.5 * Math.cos(angle) + (Math.random()-0.5)*2,
                1.5 * Math.sin(angle*1.5) + (Math.random()-0.5)*2,
                (Math.random()-0.5) * 4
            );
            scene.add(p);
            
            const label = createLabel(p.userData.name, '#e0f0ff');
            label.position.set(0, 2.2, 0);
            p.add(label);
            
            p.userData.velocity = new THREE.Vector3(
                (Math.random() - 0.5) * 0.012,
                (Math.random() - 0.5) * 0.012,
                (Math.random() - 0.5) * 0.012
            );
            p.userData.radius = p.geometry.parameters.radius;
            p.userData.mass = p.userData.radius * 1.5;
            
            planets.push(p);
        });

        // 边界
        const boundary = { x: 9, y: 5.5, z: 7 };
        
        function handleBoundary(p) {
            const vel = p.userData.velocity;
            const r = p.userData.radius;
            ['x','y','z'].forEach(axis => {
                if (p.position[axis] > boundary[axis] - r) {
                    p.position[axis] = boundary[axis] - r;
                    vel[axis] *= -0.5;
                } else if (p.position[axis] < -boundary[axis] + r) {
                    p.position[axis] = -boundary[axis] + r;
                    vel[axis] *= -0.5;
                }
            });
        }

        function handleCollisions() {
            for (let i = 0; i < planets.length; i++) {
                for (let j = i+1; j < planets.length; j++) {
                    const a = planets[i];
                    const b = planets[j];
                    const delta = new THREE.Vector3().subVectors(a.position, b.position);
                    const dist = delta.length();
                    const minDist = a.userData.radius + b.userData.radius;
                    if (dist < minDist) {
                        const correction = (minDist - dist) / 2;
                        const norm = delta.clone().normalize();
                        a.position.add(norm.clone().multiplyScalar(correction));
                        b.position.add(norm.clone().multiplyScalar(-correction));
                        
                        const va = a.userData.velocity;
                        const vb = b.userData.velocity;
                        const impulse = norm.clone().multiplyScalar((1 + 0.3) * va.dot(norm) - vb.dot(norm));
                        va.sub(impulse.multiplyScalar(0.5));
                        vb.add(impulse.multiplyScalar(0.5));
                    }
                }
            }
        }

        function createImpactEffect(position) {
            const ringGeo = new THREE.TorusGeometry(0.8, 0.05, 16, 32);
            const ringMat = new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: new THREE.Color(0xff5500), transparent: true, opacity: 0.9 });
            const impactRing = new THREE.Mesh(ringGeo, ringMat);
            impactRing.position.copy(position);
            impactRing.rotation.x = Math.PI / 2;
            scene.add(impactRing);
            
            const particles = [];
            for (let i=0; i<12; i++) {
                const pGeo = new THREE.SphereGeometry(0.08, 4);
                const pMat = new THREE.MeshStandardMaterial({ color: 0xffaa33, emissive: new THREE.Color(0xff4400) });
                const particle = new THREE.Mesh(pGeo, pMat);
                particle.position.copy(position);
                const angle = (i/12)*Math.PI*2;
                particle.userData.vel = new THREE.Vector3(Math.cos(angle)*0.15, Math.sin(angle)*0.15, (Math.random()-0.5)*0.1);
                scene.add(particle);
                particles.push(particle);
            }
            
            document.getElementById('status-tip').style.opacity = 1;
            setTimeout(() => document.getElementById('status-tip').style.opacity = 0, 400);
            
            let startTime = Date.now();
            function animateImpact() {
                const elapsed = Date.now() - startTime;
                if (elapsed > 400) {
                    scene.remove(impactRing);
                    particles.forEach(p => scene.remove(p));
                    return;
                }
                const scale = 1 + elapsed * 0.008;
                impactRing.scale.set(scale, scale, scale);
                impactRing.material.opacity = 0.9 * (1 - elapsed/500);
                impactRing.rotation.z += 0.1;
                
                particles.forEach(p => {
                    p.position.add(p.userData.vel);
                    p.userData.vel.multiplyScalar(0.96);
                    p.material.opacity = 1 - elapsed/500;
                });
                
                requestAnimationFrame(animateImpact);
            }
            requestAnimationFrame(animateImpact);
        }

        // --- 拖拽系统 (修复版) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let draggedPlanet = null;
        let dragPlane = new THREE.Plane();
        const dragOffset = new THREE.Vector3();
        const intersectionPoint = new THREE.Vector3();
        let isDragging = false;
        let dragStartPos = new THREE.Vector3();
        let hasMoved = false;
        let currentLink = null;
        
        renderer.domElement.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);
        // 防止窗口失去焦点时拖拽状态残留
        window.addEventListener('blur', () => {
            if (draggedPlanet) {
                draggedPlanet = null;
                renderer.domElement.style.cursor = 'grab';
            }
        });
        
        function onMouseDown(event) {
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(planets);
            if (intersects.length > 0) {
                draggedPlanet = intersects[0].object;
                dragPlane.setFromNormalAndCoplanarPoint(camera.getWorldDirection(dragPlane.normal).negate(), draggedPlanet.position);
                if (raycaster.ray.intersectPlane(dragPlane, intersectionPoint)) {
                    dragOffset.copy(draggedPlanet.position).sub(intersectionPoint);
                }
                dragStartPos.copy(draggedPlanet.position);
                hasMoved = false;
                isDragging = true;
                event.preventDefault();
                renderer.domElement.style.cursor = 'grabbing';
            }
        }
        
        function onMouseMove(event) {
            // 核心修复：检测鼠标按键是否仍按下，若未按下则立即终止拖拽
            if (!draggedPlanet) return;
            
            // 左键未按下 (buttons === 1 表示左键按下)
            if (event.buttons !== 1) {
                draggedPlanet = null;
                renderer.domElement.style.cursor = 'grab';
                return;
            }
            
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            if (raycaster.ray.intersectPlane(dragPlane, intersectionPoint)) {
                const newPos = intersectionPoint.clone().add(dragOffset);
                const r = draggedPlanet.userData.radius;
                newPos.x = Math.min(boundary.x - r, Math.max(-boundary.x + r, newPos.x));
                newPos.y = Math.min(boundary.y - r, Math.max(-boundary.y + r, newPos.y));
                newPos.z = Math.min(boundary.z - r, Math.max(-boundary.z + r, newPos.z));
                
                if (newPos.distanceTo(dragStartPos) > 0.3) hasMoved = true;
                
                // 拖拽中的碰撞检测
                for (let other of planets) {
                    if (other === draggedPlanet) continue;
                    const dist = newPos.distanceTo(other.position);
                    const minDist = draggedPlanet.userData.radius + other.userData.radius;
                    if (dist < minDist) {
                        createImpactEffect(newPos.clone().add(other.position).multiplyScalar(0.5));
                        const norm = new THREE.Vector3().subVectors(newPos, other.position).normalize();
                        newPos.copy(other.position.clone().add(norm.multiplyScalar(minDist + 0.1)));
                        other.userData.velocity.add(norm.clone().multiplyScalar(0.15));
                        draggedPlanet.userData.velocity.add(norm.clone().multiplyScalar(-0.1));
                        break;
                    }
                }
                
                draggedPlanet.position.copy(newPos);
            }
        }
        
        function onMouseUp(event) {
            if (draggedPlanet) {
                if (!hasMoved) {
                    // 点击跳转
                    const data = draggedPlanet.userData;
                    currentLink = data.link;
                    document.getElementById('function-title').innerHTML = `🌠 ${data.func}`;
                    document.getElementById('function-desc').innerHTML = `${data.name} · ${data.desc}`;
                    document.getElementById('function-action').innerHTML = `🚀 前往 ${data.func}`;
                }
                draggedPlanet = null;
                renderer.domElement.style.cursor = 'grab';
            }
            hasMoved = false;
        }

        // --- 动画循环 ---
        function animate() {
            requestAnimationFrame(animate);
            
            planets.forEach(p => {
                if (p !== draggedPlanet) {
                    p.position.add(p.userData.velocity);
                    p.userData.velocity.multiplyScalar(0.995);
                    handleBoundary(p);
                } else {
                    handleBoundary(p);
                }
            });
            
            handleCollisions();
            
            stars.rotation.y += 0.0002;
            planets.forEach(p => p.rotation.y += 0.005);
            
            renderer.render(scene, camera);
            cssRenderer.render(scene, camera);
        }
        
        animate();

        window.addEventListener('resize', onWindowResize);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            cssRenderer.setSize(window.innerWidth, window.innerHeight);
        }

        document.getElementById('function-action').addEventListener('click', () => {
            if (currentLink) {
                window.location.href = currentLink;
            }
        });
        
        // 装饰粒子
        const dustGeo = new THREE.BufferGeometry();
        const dustCount = 400;
        const dustPos = new Float32Array(dustCount * 3);
        for (let i=0; i<dustCount*3; i+=3) {
            dustPos[i] = (Math.random()-0.5)*30;
            dustPos[i+1] = (Math.random()-0.5)*20;
            dustPos[i+2] = (Math.random()-0.5)*30;
        }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
        const dustMat = new THREE.PointsMaterial({color: 0xaaccff, size: 0.03, transparent: true});
        const dust = new THREE.Points(dustGeo, dustMat);
        scene.add(dust);
        
        console.log('🌟 星际首页已启动 — 拖拽修复：释放鼠标即停止跟随');
    </script>
</body>
</html>
