<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>热点区 · 木星</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #1a1510 0%, #252018 50%, #1a1510 100%);
    color: #f0e5d5;
    min-height: 100vh;
}
.star-bg {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
    background-image:
        radial-gradient(2px 2px at 40px 50px, rgba(212,183,140,0.2), transparent),
        radial-gradient(1px 1px at 100px 80px, rgba(184,154,110,0.15), transparent),
        radial-gradient(2px 2px at 180px 110px, rgba(212,183,140,0.2), transparent),
        radial-gradient(1px 1px at 280px 40px, rgba(232,213,181,0.1), transparent);
}
.container { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 30px 20px; }

.header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 30px; padding-bottom: 20px;
    border-bottom: 1px solid rgba(212,183,140,0.3);
}
.header-left { display: flex; align-items: center; gap: 15px; }
.planet-icon {
    width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(135deg, #d4b78c, #b89a6e);
    box-shadow: 0 0 20px rgba(212,183,140,0.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
}
.header-title h1 {
    font-size: 1.8rem; font-weight: 300; letter-spacing: 4px;
    background: linear-gradient(135deg, #d4b78c, #f0e0c0);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header-title p { font-size: 0.85rem; opacity: 0.7; margin-top: 2px; }
.back-btn {
    padding: 8px 20px; border-radius: 30px;
    background: rgba(212,183,140,0.15); border: 1px solid rgba(212,183,140,0.4);
    color: #f0e0c0; cursor: pointer; text-decoration: none;
    transition: 0.3s; font-size: 0.9rem;
}
.back-btn:hover {
    background: rgba(212,183,140,0.3); box-shadow: 0 0 15px rgba(212,183,140,0.3);
}

/* Date Picker */
.date-bar {
    display: flex; gap: 8px; margin-bottom: 25px;
    overflow-x: auto; padding-bottom: 5px;
}
.date-btn {
    padding: 10px 18px; border-radius: 30px; cursor: pointer; white-space: nowrap;
    background: rgba(212,183,140,0.1); border: 1px solid rgba(212,183,140,0.2);
    color: #d4b78c; transition: 0.3s; font-size: 0.9rem;
}
.date-btn.active, .date-btn:hover {
    background: rgba(212,183,140,0.3); border-color: rgba(212,183,140,0.5);
    box-shadow: 0 0 15px rgba(212,183,140,0.15); color: #fff;
}
.date-btn .day-label { font-size: 0.75rem; opacity: 0.7; display: block; text-align: center; }
.date-btn .date-label { font-weight: 500; }

/* Source Tabs */
.source-tabs {
    display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
}
.source-tab {
    padding: 8px 16px; border-radius: 20px; cursor: pointer;
    background: rgba(212,183,140,0.1); border: 1px solid rgba(212,183,140,0.2);
    color: #d4b78c; transition: 0.3s; font-size: 0.85rem;
}
.source-tab.active, .source-tab:hover {
    background: rgba(212,183,140,0.25); border-color: rgba(212,183,140,0.5);
    color: #fff;
}

/* Hot List */
.hot-list { display: flex; flex-direction: column; gap: 12px; }
.hot-item {
    background: rgba(30,25,18,0.6); border: 1px solid rgba(212,183,140,0.2);
    border-radius: 16px; padding: 18px 22px;
    backdrop-filter: blur(8px); cursor: pointer;
    transition: 0.3s; display: flex; gap: 15px; align-items: flex-start;
}
.hot-item:hover {
    border-color: rgba(212,183,140,0.5);
    box-shadow: 0 5px 25px rgba(212,183,140,0.1);
    transform: translateY(-2px);
}
.hot-rank {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold; font-size: 0.9rem; flex-shrink: 0;
    background: rgba(212,183,140,0.2); color: #d4b78c;
    border: 1px solid rgba(212,183,140,0.3);
}
.hot-rank.top3 {
    background: linear-gradient(135deg, #d4b78c, #b89a6e);
    color: #1a1510; border: none;
    box-shadow: 0 0 10px rgba(212,183,140,0.3);
}
.hot-content { flex: 1; }
.hot-title { font-size: 1.05rem; margin-bottom: 6px; color: #f0e5d5; }
.hot-desc { font-size: 0.88rem; opacity: 0.7; line-height: 1.5; margin-bottom: 8px; }
.hot-meta { display: flex; gap: 15px; font-size: 0.8rem; opacity: 0.5; }
.hot-tag {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 0.75rem; background: rgba(212,183,140,0.15);
    color: #d4b78c; border: 1px solid rgba(212,183,140,0.2);
}
.hot-tag.hot { background: rgba(192,60,60,0.2); color: #ff9999; border-color: rgba(192,60,60,0.3); }
.hot-tag.new { background: rgba(60,160,100,0.2); color: #99ffbb; border-color: rgba(60,160,100,0.3); }

/* Detail Modal */
.modal-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10,8,6,0.85); z-index: 100; backdrop-filter: blur(5px);
    align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.active { display: flex; }
.modal-box {
    background: linear-gradient(135deg, #252018, #1e1812);
    border: 1px solid rgba(212,183,140,0.3); border-radius: 24px;
    max-width: 600px; width: 100%; max-height: 80vh; overflow-y: auto;
    padding: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
}
.modal-close {
    float: right; width: 36px; height: 36px; border-radius: 50%;
    background: rgba(212,183,140,0.15); border: 1px solid rgba(212,183,140,0.3);
    color: #d4b78c; cursor: pointer; font-size: 1.2rem;
    display: flex; align-items: center; justify-content: center;
    transition: 0.3s;
}
.modal-close:hover { background: rgba(212,183,140,0.3); }
.modal-title { font-size: 1.3rem; font-weight: 400; margin-bottom: 10px; color: #f0e0c0; }
.modal-source { font-size: 0.85rem; opacity: 0.6; margin-bottom: 20px; }
.modal-body { line-height: 1.8; opacity: 0.9; font-size: 0.95rem; }
.modal-stats { display: flex; gap: 20px; margin-top: 25px; padding-top: 20px;
    border-top: 1px solid rgba(212,183,140,0.2); font-size: 0.9rem; opacity: 0.7;
}

.empty-state { text-align: center; padding: 50px 20px; opacity: 0.5; }
</style>
</head>
<body>
<div class="star-bg"></div>
<div class="container">
    <div class="header">
        <div class="header-left">
            <div class="planet-icon">🟤</div>
            <div class="header-title">
                <h1>热点区</h1>
                <p>木星 · 每日热点汇聚</p>
            </div>
        </div>
        <a href="index.html" class="back-btn">← 返回星域</a>
    </div>

    <!-- Date Bar -->
    <div class="date-bar" id="date-bar"></div>

    <!-- Source Filter -->
    <div class="source-tabs" id="source-tabs">
        <div class="source-tab active" onclick="filterSource('all')">全部</div>
        <div class="source-tab" onclick="filterSource('weibo')">🔥 微博</div>
        <div class="source-tab" onclick="filterSource('zhihu')">💡 知乎</div>
        <div class="source-tab" onclick="filterSource('bilibili')">📺 B站</div>
        <div class="source-tab" onclick="filterSource('tech')">💻 科技</div>
        <div class="source-tab" onclick="filterSource('github')">🐙 GitHub</div>
    </div>

    <!-- Hot List -->
    <div class="hot-list" id="hot-list"></div>
    <div id="empty-state" class="empty-state" style="display:none">
        <p>当日暂无热点数据</p>
    </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeModal()">×</button>
        <h2 class="modal-title" id="modal-title"></h2>
        <div class="modal-source" id="modal-source"></div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-stats" id="modal-stats"></div>
    </div>
</div>

<script>
// ===== Data =====
const today = new Date();
const dates = Array.from({length: 7}, (_, i) => {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    return d;
});

const sourceNames = {
    weibo: '🔥 微博热搜', zhihu: '💡 知乎热榜', bilibili: '📺 B站热门',
    tech: '💻 科技资讯', github: '🐙 GitHub Trending'
};

const demoData = {};

function generateNews(dateStr, source) {
    const templates = {
        weibo: [
            { title: '新发现的系外行星可能有生命迹象', desc: '天文学家在宜居带发现类似地球的大气层成分', heat: '沸', views: '2.1亿', comments: '18.5万' },
            { title: '国产大模型再创新高，性能超越国际水平', desc: '最新评测显示中文理解能力全球第一', heat: '热', views: '1.8亿', comments: '12.3万' },
            { title: '某知名导演宣布执导科幻巨制', desc: '投资规模创华语电影史新高', heat: '热', views: '9800万', comments: '8.2万' },
            { title: '全球气候峰会在日内瓦召开', desc: '190个国家代表出席，达成新的碳中和协议', heat: '新', views: '7500万', comments: '5.1万' },
            { title: '新型固态电池技术取得突破', desc: '充电5分钟续航1000公里成为可能', heat: '沸', views: '1.5亿', comments: '9.8万' },
            { title: '人工智能生成内容版权新规出台', desc: '明确AI创作内容的归属权和使用规范', heat: '热', views: '6200万', comments: '4.5万' }
        ],
        zhihu: [
            { title: '如何评价最新的量子计算机突破？', desc: '255个回答 · 量子物理话题优秀回答者参与讨论', heat: '热', views: '45万', comments: '255' },
            { title: '未来十年最值得学习的技能是什么？', desc: '892个回答 · 涵盖AI、生物技术、能源等领域', heat: '沸', views: '120万', comments: '892' },
            { title: 'SpaceX星舰第四次发射成功的意义', desc: '156个回答 · 航天工程师详细解读技术细节', heat: '热', views: '68万', comments: '156' },
            { title: '为什么现在的年轻人更向往太空探索？', desc: '432个回答 · 从心理学和社会学角度分析', heat: '新', views: '38万', comments: '432' },
            { title: '脑机接口技术的最新进展和伦理问题', desc: '321个回答 · 神经科学家和伦理学家深度探讨', heat: '热', views: '52万', comments: '321' }
        ],
        bilibili: [
            { title: '【4K】沉浸式太空漫步 · 国际空间站实拍', desc: '播放量 385万 · 弹幕 2.4万 · UP主: 星际视界', heat: '热', views: '385万', comments: '1.8万' },
            { title: '我用AI重建了整个火星表面 · 3D渲染', desc: '播放量 256万 · 弹幕 1.9万 · UP主: 像素火星', heat: '沸', views: '256万', comments: '2.1万' },
            { title: '科普：如果太阳突然熄灭，人类能撑多久？', desc: '播放量 178万 · 弹幕 1.2万 · UP主: 宇宙漫游指南', heat: '热', views: '178万', comments: '9800' },
            { title: '【手书】星际穿越 · 不要温和地走进那个良夜', desc: '播放量 145万 · 弹幕 9800 · UP主: 星空绘师', heat: '新', views: '145万', comments: '7500' },
            { title: '自制火箭成功发射并回收！全程记录', desc: '播放量 320万 · 弹幕 2.8万 · UP主: 硬核玩家', heat: '沸', views: '320万', comments: '3.2万' }
        ],
        tech: [
            { title: 'OpenAI发布GPT-5预览版，多模态能力大幅提升', desc: '支持文本、图像、音频、视频统一处理', heat: '沸', views: '88万', comments: '4500' },
            { title: '苹果Vision Pro 2代或于明年春季发布', desc: '重量减轻40%，视场角提升至120度', heat: '热', views: '42万', comments: '2800' },
            { title: 'Linux Kernel 6.9正式发布，新增AI调度器', desc: '专为机器学习工作负载优化的进程调度', heat: '新', views: '18万', comments: '1200' },
            { title: '谷歌DeepMind蛋白质预测准确率达95%', desc: '新药研发周期有望从10年缩短至2年', heat: '热', views: '35万', comments: '2100' },
            { title: 'Rust基金会宣布进入Linux内核2.0时代', desc: '更多核心模块将使用Rust重写', heat: '热', views: '28万', comments: '3400' }
        ],
        github: [
            { title: 'starship / starship', desc: 'The minimal, blazing-fast, and infinitely customizable prompt for any shell! ⭐ 42.3k', heat: '热', views: '12万', comments: '890' },
            { title: 'microsoft / generative-ai-for-beginners', desc: '21 Lessons, Get Started Building with AI ⭐ 58.1k', heat: '沸', views: '25万', comments: '1200' },
            { title: 'Developer-Y / cs-video-courses', desc: 'List of Computer Science courses with video lectures. ⭐ 65.2k', heat: '热', views: '18万', comments: '950' },
            { title: 'rust-lang / rust', desc: 'Empowering everyone to build reliable and efficient software. ⭐ 92.1k', heat: '热', views: '30万', comments: '2100' },
            { title: 'oven-sh / bun', desc: 'Incredibly fast JavaScript runtime, bundler, test runner ⭐ 72.5k', heat: '新', views: '15万', comments: '780' }
        ]
    };
    const items = templates[source] || [];
    // Deterministic shuffle based on date
    const seed = dateStr.split('-').join('') + source;
    const shuffled = [...items].sort((a, b) => {
        const hash = s => s.split('').reduce((acc, c) => acc + c.charCodeAt(0), 0);
        return (hash(a.title + seed) % 100) - (hash(b.title + seed) % 100);
    });
    return shuffled.slice(0, 4 + Math.floor(Math.random() * 2));
}

// Generate all data
function generateAllData() {
    dates.forEach(date => {
        const ds = formatDate(date);
        demoData[ds] = {};
        Object.keys(sourceNames).forEach(src => {
            demoData[ds][src] = generateNews(ds, src);
        });
    });
}

let currentDate = formatDate(dates[0]);
let currentSource = 'all';

function formatDate(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatDisplayDate(d) {
    const days = ['周日','周一','周二','周三','周四','周五','周六'];
    return { day: days[d.getDay()], date: `${d.getMonth()+1}/${d.getDate()}` };
}

// ===== Render =====
function renderDateBar() {
    const bar = document.getElementById('date-bar');
    bar.innerHTML = dates.map(d => {
        const ds = formatDate(d);
        const disp = formatDisplayDate(d);
        const isToday = ds === formatDate(dates[0]);
        return `<div class="date-btn ${ds === currentDate ? 'active' : ''}" onclick="selectDate('${ds}')">
            <span class="day-label">${isToday ? '今天' : disp.day}</span>
            <span class="date-label">${disp.date}</span>
        </div>`;
    }).join('');
}

function renderHotList() {
    const list = document.getElementById('hot-list');
    const empty = document.getElementById('empty-state');
    const data = demoData[currentDate];
    let items = [];

    if (currentSource === 'all') {
        Object.keys(data).forEach(src => {
            data[src].forEach((item, i) => {
                items.push({ ...item, source: src, rank: i + 1, srcName: sourceNames[src] });
            });
        });
        // Sort by "heat" priority
        const heatOrder = { '沸': 3, '热': 2, '新': 1 };
        items.sort((a, b) => (heatOrder[b.heat] || 0) - (heatOrder[a.heat] || 0));
    } else {
        items = data[currentSource].map((item, i) => ({
            ...item, source: currentSource, rank: i + 1, srcName: sourceNames[currentSource]
        }));
    }

    if (items.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        return;
    }
    empty.style.display = 'none';

    list.innerHTML = items.map((item, idx) => `
        <div class="hot-item" onclick="openModal('${item.source}', '${encodeURIComponent(item.title)}')">
            <div class="hot-rank ${idx < 3 ? 'top3' : ''}">${idx + 1}</div>
            <div class="hot-content">
                <div class="hot-title">${item.title}</div>
                <div class="hot-desc">${item.desc}</div>
                <div class="hot-meta">
                    <span class="hot-tag ${item.heat === '沸' ? 'hot' : (item.heat === '新' ? 'new' : '')}">${item.heat}</span>
                    <span>${item.srcName}</span>
                    <span>👁 ${item.views}</span>
                    <span>💬 ${item.comments}</span>
                </div>
            </div>
        </div>
    `).join('');
}

function selectDate(ds) {
    currentDate = ds;
    renderDateBar();
    renderHotList();
}

function filterSource(src) {
    currentSource = src;
    document.querySelectorAll('.source-tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    renderHotList();
}

function openModal(source, titleEncoded) {
    const title = decodeURIComponent(titleEncoded);
    const items = demoData[currentDate][source];
    const item = items.find(i => i.title === title);
    if (!item) return;

    document.getElementById('modal-title').textContent = item.title;
    document.getElementById('modal-source').innerHTML = `${item.srcName} · ${currentDate}`;
    document.getElementById('modal-body').innerHTML = `
        <p style="margin-bottom:20px">${item.desc}</p>
        <p>这里是关于「${item.title}」的详细内容。该话题目前在${item.srcName}平台热度为「${item.heat}」，已产生${item.views}次浏览和${item.comments}条讨论。</p>
        <p style="margin-top:15px">相关内容持续更新中，点击来源链接可查看原始页面获取最新进展。</p>
    `;
    document.getElementById('modal-stats').innerHTML = `
        <span>👁 浏览 ${item.views}</span>
        <span>💬 讨论 ${item.comments}</span>
        <span>🔥 热度 ${item.heat}</span>
    `;
    document.getElementById('modal').classList.add('active');
}

function closeModal(e) {
    if (!e || e.target.id === 'modal' || e.target.classList.contains('modal-close')) {
        document.getElementById('modal').classList.remove('active');
    }
}

// Init
generateAllData();
renderDateBar();
renderHotList();
</script>
</body>
</html>
