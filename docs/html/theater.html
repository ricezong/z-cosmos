<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>剧场区 · 火星</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #1a0a0a 0%, #2a1010 50%, #1a0a0a 100%);
    color: #ffe0d0;
    min-height: 100vh;
}
.star-bg {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
    background-image:
        radial-gradient(2px 2px at 30px 40px, rgba(255,150,100,0.2), transparent),
        radial-gradient(1px 1px at 80px 90px, rgba(255,180,140,0.15), transparent),
        radial-gradient(2px 2px at 150px 60px, rgba(255,120,80,0.2), transparent),
        radial-gradient(1px 1px at 250px 130px, rgba(255,160,120,0.1), transparent);
}
.container { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 30px 20px; }

.header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 30px; padding-bottom: 20px;
    border-bottom: 1px solid rgba(217,122,92,0.3);
}
.header-left { display: flex; align-items: center; gap: 15px; }
.planet-icon {
    width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(135deg, #c05c3e, #d97a5c);
    box-shadow: 0 0 20px rgba(217,122,92,0.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
}
.header-title h1 {
    font-size: 1.8rem; font-weight: 300; letter-spacing: 4px;
    background: linear-gradient(135deg, #d97a5c, #ffbba0);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header-title p { font-size: 0.85rem; opacity: 0.7; margin-top: 2px; }
.back-btn {
    padding: 8px 20px; border-radius: 30px;
    background: rgba(192,92,62,0.2); border: 1px solid rgba(217,122,92,0.4);
    color: #ffbba0; cursor: pointer; text-decoration: none;
    transition: 0.3s; font-size: 0.9rem;
}
.back-btn:hover {
    background: rgba(192,92,62,0.4); box-shadow: 0 0 15px rgba(217,122,92,0.3);
}

.tabs {
    display: flex; gap: 10px; margin-bottom: 25px;
}
.tab {
    padding: 10px 24px; border-radius: 30px; cursor: pointer;
    background: rgba(192,92,62,0.15); border: 1px solid rgba(217,122,92,0.25);
    color: #ffbba0; transition: 0.3s; font-size: 0.95rem;
}
.tab.active, .tab:hover {
    background: rgba(192,92,62,0.35); border-color: rgba(217,122,92,0.6);
    box-shadow: 0 0 15px rgba(217,122,92,0.2); color: #fff;
}

.panel { display: none; }
.panel.active { display: block; }

/* Theater Stage */
.stage {
    background: rgba(20,8,8,0.7); border: 1px solid rgba(217,122,92,0.25);
    border-radius: 20px; padding: 25px; margin-bottom: 25px;
    backdrop-filter: blur(10px);
}
.stage-title {
    font-size: 1.3rem; font-weight: 400; margin-bottom: 5px;
    color: #ffbba0; letter-spacing: 2px;
}
.stage-desc { font-size: 0.9rem; opacity: 0.7; margin-bottom: 20px; }

.canvas-wrapper {
    background: #0a0505; border-radius: 16px;
    border: 2px solid rgba(217,122,92,0.3);
    overflow: hidden; position: relative;
    box-shadow: inset 0 0 40px rgba(192,92,62,0.1);
}
.theater-canvas {
    width: 100%; height: 400px; display: block;
    background: #0a0505;
}

.controls {
    display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap;
    align-items: center;
}
.ctrl-btn {
    padding: 10px 22px; border-radius: 30px; border: none;
    background: linear-gradient(135deg, #c05c3e, #d97a5c);
    color: white; cursor: pointer; font-size: 0.9rem;
    transition: 0.3s; letter-spacing: 1px;
}
.ctrl-btn:hover {
    box-shadow: 0 0 20px rgba(217,122,92,0.4); transform: translateY(-1px);
}
.ctrl-btn.secondary {
    background: rgba(192,92,62,0.2); border: 1px solid rgba(217,122,92,0.4);
}
.ctrl-btn.secondary:hover {
    background: rgba(192,92,62,0.35);
}
.ctrl-select {
    padding: 10px 18px; border-radius: 30px;
    background: rgba(20,8,8,0.8); border: 1px solid rgba(217,122,92,0.3);
    color: #ffe0d0; font-size: 0.9rem; outline: none;
}

.status-bar {
    display: flex; gap: 20px; margin-top: 15px; font-size: 0.85rem;
    opacity: 0.7;
}

/* Pixel grid preview */
.pixel-grid {
    display: grid; grid-template-columns: repeat(16, 1fr);
    gap: 2px; max-width: 300px; margin: 0 auto;
}
.pixel-cell {
    aspect-ratio: 1; background: #1a0a0a;
    border-radius: 2px; cursor: pointer;
    transition: 0.1s;
}
.pixel-cell.active {
    background: #d97a5c; box-shadow: 0 0 6px rgba(217,122,92,0.5);
}

.empty-state {
    text-align: center; padding: 50px 20px; opacity: 0.5;
}
</style>
</head>
<body>
<div class="star-bg"></div>
<div class="container">
    <div class="header">
        <div class="header-left">
            <div class="planet-icon">🔴</div>
            <div class="header-title">
                <h1>剧场区</h1>
                <p>火星 · 表演艺术中心</p>
            </div>
        </div>
        <a href="index.html" class="back-btn">← 返回星域</a>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('stickman')">🎭 火柴人剧场</div>
        <div class="tab" onclick="switchTab('pixel')">👾 像素剧场</div>
    </div>

    <!-- Stickman Panel -->
    <div id="stickman-panel" class="panel active">
        <div class="stage">
            <div class="stage-title">🎬 火柴人动画剧场</div>
            <div class="stage-desc">选择场景，观看火柴人的精彩表演</div>
            <div class="canvas-wrapper">
                <canvas id="stickman-canvas" class="theater-canvas"></canvas>
            </div>
            <div class="controls">
                <select id="stickman-scene" class="ctrl-select" onchange="changeStickmanScene()">
                    <option value="walk">🚶 行走</option>
                    <option value="run">🏃 奔跑</option>
                    <option value="jump">🦘 跳跃</option>
                    <option value="dance">💃 舞蹈</option>
                    <option value="fight">🥋 格斗</option>
                    <option value="wave">👋 挥手</option>
                </select>
                <button class="ctrl-btn" onclick="playStickman()">▶ 播放</button>
                <button class="ctrl-btn secondary" onclick="pauseStickman()">⏸ 暂停</button>
                <button class="ctrl-btn secondary" onclick="resetStickman()">↺ 重置</button>
            </div>
            <div class="status-bar">
                <span id="stickman-status">状态: 准备就绪</span>
                <span id="stickman-frame">帧: 0</span>
            </div>
        </div>
    </div>

    <!-- Pixel Panel -->
    <div id="pixel-panel" class="panel">
        <div class="stage">
            <div class="stage-title">🕹️ 像素动画剧场</div>
            <div class="stage-desc">复古像素风格的动画演示</div>
            <div class="canvas-wrapper">
                <canvas id="pixel-canvas" class="theater-canvas"></canvas>
            </div>
            <div class="controls">
                <select id="pixel-scene" class="ctrl-select" onchange="changePixelScene()">
                    <option value="matrix">🌧️ 像素雨</option>
                    <option value="bounce">🏀 弹跳球</option>
                    <option value="snake">🐍 贪吃蛇</option>
                    <option value="starfield">🌌 星际穿越</option>
                    <option value="fire">🔥 火焰效果</option>
                    <option value="wave">🌊 波浪</option>
                </select>
                <button class="ctrl-btn" onclick="playPixel()">▶ 播放</button>
                <button class="ctrl-btn secondary" onclick="pausePixel()">⏸ 暂停</button>
                <button class="ctrl-btn secondary" onclick="resetPixel()">↺ 重置</button>
            </div>
            <div class="status-bar">
                <span id="pixel-status">状态: 准备就绪</span>
                <span id="pixel-frame">帧: 0</span>
            </div>
        </div>
    </div>
</div>

<script>
// ===== Tab Switching =====
function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(tab + '-panel').classList.add('active');
}

// ===== Stickman Theater =====
const stickCanvas = document.getElementById('stickman-canvas');
const stickCtx = stickCanvas.getContext('2d');
let stickAnimId = null;
let stickFrame = 0;
let stickPlaying = false;
let stickScene = 'walk';

function resizeStickCanvas() {
    const rect = stickCanvas.parentElement.getBoundingClientRect();
    stickCanvas.width = rect.width;
    stickCanvas.height = 400;
}

function drawStickman(ctx, x, y, scale, pose) {
    ctx.strokeStyle = '#ffccaa';
    ctx.lineWidth = 3 * scale;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    const headY = y - 50 * scale;
    const bodyTop = headY + 15 * scale;
    const bodyBot = bodyTop + 40 * scale;
    const shoulderY = bodyTop + 5 * scale;
    const hipY = bodyBot - 5 * scale;

    // Head
    ctx.beginPath();
    ctx.arc(x, headY, 12 * scale, 0, Math.PI * 2);
    ctx.stroke();
    // Eyes
    ctx.fillStyle = '#ffccaa';
    ctx.beginPath(); ctx.arc(x - 4*scale, headY - 2*scale, 2*scale, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 4*scale, headY - 2*scale, 2*scale, 0, Math.PI*2); ctx.fill();

    // Body
    ctx.beginPath();
    ctx.moveTo(x, bodyTop);
    ctx.lineTo(x, bodyBot);
    ctx.stroke();

    // Arms
    const armLen = 25 * scale;
    ctx.beginPath();
    ctx.moveTo(x, shoulderY);
    ctx.lineTo(x + Math.cos(pose.la) * armLen, shoulderY + Math.sin(pose.la) * armLen);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, shoulderY);
    ctx.lineTo(x + Math.cos(pose.ra) * armLen, shoulderY + Math.sin(pose.ra) * armLen);
    ctx.stroke();

    // Legs
    const legLen = 30 * scale;
    ctx.beginPath();
    ctx.moveTo(x, hipY);
    ctx.lineTo(x + Math.cos(pose.ll) * legLen, hipY + Math.sin(pose.ll) * legLen);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, hipY);
    ctx.lineTo(x + Math.cos(pose.rl) * legLen, hipY + Math.sin(pose.rl) * legLen);
    ctx.stroke();
}

function getStickmanPose(scene, frame) {
    const t = frame * 0.05;
    switch(scene) {
        case 'walk':
            return {
                la: Math.sin(t) * 0.8 - 0.2,
                ra: Math.sin(t + Math.PI) * 0.8 - 0.2,
                ll: Math.sin(t + Math.PI) * 0.6 + 0.3,
                rl: Math.sin(t) * 0.6 + 0.3
            };
        case 'run':
            return {
                la: Math.sin(t * 2) * 1.2 - 0.5,
                ra: Math.sin(t * 2 + Math.PI) * 1.2 - 0.5,
                ll: Math.sin(t * 2 + Math.PI) * 1.0 + 0.5,
                rl: Math.sin(t * 2) * 1.0 + 0.5
            };
        case 'jump': {
            const jumpPhase = (frame % 60) / 60;
            const jumpY = Math.sin(jumpPhase * Math.PI) * 2;
            return {
                la: jumpPhase < 0.3 ? -2.5 : (jumpPhase > 0.7 ? -0.5 : -1.0),
                ra: jumpPhase < 0.3 ? -2.5 : (jumpPhase > 0.7 ? -0.5 : -1.0),
                ll: jumpPhase < 0.5 ? -0.5 : 0.8,
                rl: jumpPhase < 0.5 ? -0.5 : 0.8,
                offsetY: -jumpY * 30
            };
        }
        case 'dance':
            return {
                la: Math.sin(t * 1.5) * 1.5 + 0.5,
                ra: Math.cos(t * 1.5) * 1.5 + 0.5,
                ll: Math.cos(t * 1.5) * 0.8 + 0.5,
                rl: Math.sin(t * 1.5) * 0.8 + 0.5
            };
        case 'fight': {
            const punch = (frame % 40) < 10;
            return {
                la: punch ? -0.2 : -0.8,
                ra: punch ? -2.8 : -0.8,
                ll: 0.5,
                rl: 0.8
            };
        }
        case 'wave':
            return {
                la: Math.sin(t * 0.5) * 0.3 - 0.3,
                ra: Math.sin(t * 2) * 0.5 - 2.5,
                ll: 0.3,
                rl: 0.5
            };
        default:
            return { la: -0.5, ra: -0.5, ll: 0.3, rl: 0.3 };
    }
}

function animateStickman() {
    if (!stickPlaying) return;
    stickFrame++;
    const ctx = stickCtx;
    const w = stickCanvas.width, h = stickCanvas.height;
    ctx.clearRect(0, 0, w, h);

    // Ground
    ctx.strokeStyle = 'rgba(217,122,92,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, h - 80);
    ctx.lineTo(w, h - 80);
    ctx.stroke();

    // Grid lines
    for (let i = 0; i < w; i += 80) {
        ctx.beginPath();
        ctx.moveTo(i, h - 80);
        ctx.lineTo(i, h - 70);
        ctx.stroke();
    }

    const pose = getStickmanPose(stickScene, stickFrame);
    let x = w / 2;
    let y = h - 80;

    if (stickScene === 'walk' || stickScene === 'run') {
        x = (stickFrame * 3) % (w + 100) - 50;
    }
    if (pose.offsetY) y += pose.offsetY;

    // Shadow
    ctx.fillStyle = 'rgba(217,122,92,0.15)';
    ctx.beginPath();
    ctx.ellipse(x, h - 78, 20, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    drawStickman(ctx, x, y, 1.2, pose);

    document.getElementById('stickman-frame').textContent = '帧: ' + stickFrame;
    stickAnimId = requestAnimationFrame(animateStickman);
}

function playStickman() {
    if (stickPlaying) return;
    stickPlaying = true;
    document.getElementById('stickman-status').textContent = '状态: 播放中';
    animateStickman();
}
function pauseStickman() {
    stickPlaying = false;
    cancelAnimationFrame(stickAnimId);
    document.getElementById('stickman-status').textContent = '状态: 已暂停';
}
function resetStickman() {
    stickPlaying = false;
    cancelAnimationFrame(stickAnimId);
    stickFrame = 0;
    stickCtx.clearRect(0, 0, stickCanvas.width, stickCanvas.height);
    document.getElementById('stickman-status').textContent = '状态: 准备就绪';
    document.getElementById('stickman-frame').textContent = '帧: 0';
}
function changeStickmanScene() {
    stickScene = document.getElementById('stickman-scene').value;
    resetStickman();
}

// ===== Pixel Theater =====
const pixCanvas = document.getElementById('pixel-canvas');
const pixCtx = pixCanvas.getContext('2d');
let pixAnimId = null;
let pixFrame = 0;
let pixPlaying = false;
let pixScene = 'matrix';

function resizePixelCanvas() {
    const rect = pixCanvas.parentElement.getBoundingClientRect();
    pixCanvas.width = rect.width;
    pixCanvas.height = 400;
}

// Scene states
let matrixDrops = [];
let bounceBall = { x: 50, y: 50, vx: 4, vy: 3, r: 12 };
let snake = { body: [{x:10,y:10}], dir: 'right', food: {x:15,y:15} };
let stars = [];
let firePixels = [];

function initMatrix() {
    const cols = Math.floor(pixCanvas.width / 14);
    matrixDrops = Array(cols).fill(0).map(() => Math.random() * -50);
}
function initBounce() {
    bounceBall = { x: 50, y: 50, vx: 4, vy: 3, r: 12 };
}
function initSnake() {
    snake = { body: [{x:10,y:10},{x:9,y:10},{x:8,y:10}], dir: 'right', food: {x:15,y:15} };
}
function initStarfield() {
    stars = Array(100).fill(0).map(() => ({
        x: Math.random() * pixCanvas.width,
        y: Math.random() * pixCanvas.height,
        z: Math.random() * 2 + 0.5,
        speed: Math.random() * 3 + 1
    }));
}
function initFire() {
    const w = Math.floor(pixCanvas.width / 4);
    firePixels = Array(w).fill(0);
}

function animatePixel() {
    if (!pixPlaying) return;
    pixFrame++;
    const ctx = pixCtx;
    const w = pixCanvas.width, h = pixCanvas.height;

    if (pixScene === 'matrix') {
        ctx.fillStyle = 'rgba(10,5,5,0.15)';
        ctx.fillRect(0, 0, w, h);
        const cols = Math.floor(w / 14);
        ctx.font = '14px monospace';
        for (let i = 0; i < cols; i++) {
            const char = String.fromCharCode(0x30A0 + Math.random() * 96);
            const y = matrixDrops[i] * 14;
            ctx.fillStyle = `rgba(217, ${122 + Math.random()*80}, ${92 + Math.random()*60}, ${Math.random()})`;
            ctx.fillText(char, i * 14, y);
            matrixDrops[i]++;
            if (y > h && Math.random() > 0.975) matrixDrops[i] = 0;
        }
    } else if (pixScene === 'bounce') {
        ctx.fillStyle = '#0a0505';
        ctx.fillRect(0, 0, w, h);
        bounceBall.x += bounceBall.vx;
        bounceBall.y += bounceBall.vy;
        if (bounceBall.x - bounceBall.r < 0 || bounceBall.x + bounceBall.r > w) bounceBall.vx *= -1;
        if (bounceBall.y - bounceBall.r < 0 || bounceBall.y + bounceBall.r > h) bounceBall.vy *= -1;
        ctx.fillStyle = '#d97a5c';
        ctx.shadowColor = '#d97a5c';
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.arc(bounceBall.x, bounceBall.y, bounceBall.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        // Trail
        ctx.fillStyle = 'rgba(217,122,92,0.3)';
        ctx.beginPath();
        ctx.arc(bounceBall.x - bounceBall.vx*2, bounceBall.y - bounceBall.vy*2, bounceBall.r*0.7, 0, Math.PI*2);
        ctx.fill();
    } else if (pixScene === 'snake') {
        if (pixFrame % 8 === 0) {
            const head = { ...snake.body[0] };
            if (snake.dir === 'right') head.x++;
            if (snake.dir === 'left') head.x--;
            if (snake.dir === 'up') head.y--;
            if (snake.dir === 'down') head.y++;
            snake.body.unshift(head);
            if (head.x === snake.food.x && head.y === snake.food.y) {
                snake.food = { x: Math.floor(Math.random()*20), y: Math.floor(Math.random()*20) };
            } else {
                snake.body.pop();
            }
            // Auto turn
            if (head.x >= 20) snake.dir = 'down';
            if (head.y >= 20) snake.dir = 'left';
            if (head.x <= 0) snake.dir = 'up';
            if (head.y <= 0) snake.dir = 'right';
        }
        ctx.fillStyle = '#0a0505';
        ctx.fillRect(0, 0, w, h);
        const cellSize = Math.min(w, h) / 22;
        const offsetX = (w - cellSize * 22) / 2;
        const offsetY = (h - cellSize * 22) / 2;
        // Grid
        ctx.strokeStyle = 'rgba(217,122,92,0.1)';
        ctx.lineWidth = 1;
        for (let i = 0; i <= 22; i++) {
            ctx.beginPath(); ctx.moveTo(offsetX + i*cellSize, offsetY); ctx.lineTo(offsetX + i*cellSize, offsetY + 22*cellSize); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(offsetX, offsetY + i*cellSize); ctx.lineTo(offsetX + 22*cellSize, offsetY + i*cellSize); ctx.stroke();
        }
        // Snake
        ctx.fillStyle = '#d97a5c';
        snake.body.forEach((seg, i) => {
            ctx.fillRect(offsetX + seg.x * cellSize + 1, offsetY + seg.y * cellSize + 1, cellSize - 2, cellSize - 2);
        });
        // Food
        ctx.fillStyle = '#ffccaa';
        ctx.fillRect(offsetX + snake.food.x * cellSize + 1, offsetY + snake.food.y * cellSize + 1, cellSize - 2, cellSize - 2);
    } else if (pixScene === 'starfield') {
        ctx.fillStyle = 'rgba(10,5,5,0.3)';
        ctx.fillRect(0, 0, w, h);
        stars.forEach(star => {
            star.x -= star.speed;
            if (star.x < 0) { star.x = w; star.y = Math.random() * h; }
            const size = star.z;
            ctx.fillStyle = `rgba(255, ${200 + Math.random()*55}, ${180 + Math.random()*40}, ${Math.min(1, star.z/2)})`;
            ctx.fillRect(star.x, star.y, size * 3, size);
        });
    } else if (pixScene === 'fire') {
        ctx.fillStyle = '#0a0505';
        ctx.fillRect(0, 0, w, h);
        const cols = Math.floor(w / 4);
        if (pixFrame % 2 === 0) {
            for (let i = 0; i < cols; i++) {
                firePixels[i] = Math.max(0, (firePixels[i] || 0) - Math.random() * 15);
                if (Math.random() > 0.85) firePixels[i] = 100 + Math.random() * 100;
            }
        }
        for (let i = 0; i < cols; i++) {
            const height = firePixels[i] || 0;
            if (height > 0) {
                const hue = height > 80 ? 20 : (height > 50 ? 15 : 0);
                ctx.fillStyle = `hsl(${10 + Math.random()*20}, ${80 + Math.random()*20}%, ${30 + height/3}%)`;
                ctx.fillRect(i * 4, h - height, 3, height);
            }
        }
    } else if (pixScene === 'wave') {
        ctx.fillStyle = '#0a0505';
        ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = '#d97a5c';
        ctx.lineWidth = 2;
        for (let y = 0; y < h; y += 8) {
            ctx.beginPath();
            for (let x = 0; x < w; x += 4) {
                const waveY = y + Math.sin((x + pixFrame * 3) * 0.02) * 15 + Math.sin((x + pixFrame * 2) * 0.01) * 10;
                if (x === 0) ctx.moveTo(x, waveY); else ctx.lineTo(x, waveY);
            }
            ctx.globalAlpha = 0.3 + (y / h) * 0.5;
            ctx.stroke();
        }
        ctx.globalAlpha = 1;
    }

    document.getElementById('pixel-frame').textContent = '帧: ' + pixFrame;
    pixAnimId = requestAnimationFrame(animatePixel);
}

function playPixel() {
    if (pixPlaying) return;
    pixPlaying = true;
    document.getElementById('pixel-status').textContent = '状态: 播放中';
    animatePixel();
}
function pausePixel() {
    pixPlaying = false;
    cancelAnimationFrame(pixAnimId);
    document.getElementById('pixel-status').textContent = '状态: 已暂停';
}
function resetPixel() {
    pixPlaying = false;
    cancelAnimationFrame(pixAnimId);
    pixFrame = 0;
    pixCtx.clearRect(0, 0, pixCanvas.width, pixCanvas.height);
    document.getElementById('pixel-status').textContent = '状态: 准备就绪';
    document.getElementById('pixel-frame').textContent = '帧: 0';
    initPixelScene();
}
function changePixelScene() {
    pixScene = document.getElementById('pixel-scene').value;
    resetPixel();
}
function initPixelScene() {
    if (pixScene === 'matrix') initMatrix();
    if (pixScene === 'bounce') initBounce();
    if (pixScene === 'snake') initSnake();
    if (pixScene === 'starfield') initStarfield();
    if (pixScene === 'fire') initFire();
}

// Init
window.addEventListener('resize', () => { resizeStickCanvas(); resizePixelCanvas(); });
resizeStickCanvas();
resizePixelCanvas();
initMatrix();
initPixelScene();

// Auto play on load
setTimeout(() => { playStickman(); }, 500);
</script>
</body>
</html>
