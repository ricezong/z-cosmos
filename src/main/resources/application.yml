# 服务端口
server:
  port: 8888

spring:
  application:
    name: z-cosmos

  thymeleaf:
    cache: false

  ai:
    deepseek:
      chat:
        api-key: sk-1ffa55ae66********************

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 100MB

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/z-community?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: user
    password: pwd
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 600000
      connection-timeout: 30000
      max-lifetime: 1800000

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 1000ms


  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false


# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: cn.kong.cosmos.biz.*,cn.kong.cosmos.auth.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 第三方 OAuth 配置（生产环境必须通过环境变量注入，此处仅作开发参考）
oauth:
  github:
    client-id: ${OAUTH_GITHUB_CLIENT_ID:}
    client-secret: ${OAUTH_GITHUB_CLIENT_SECRET:}
    redirect-uri: ${OAUTH_GITHUB_REDIRECT_URI:http://localhost:8080/api/auth/oauth/callback?provider=github}
  gitee:
    client-id: ${OAUTH_GITEE_CLIENT_ID:}
    client-secret: ${OAUTH_GITEE_CLIENT_SECRET:}
    redirect-uri: ${OAUTH_GITEE_REDIRECT_URI:http://localhost:8080/api/auth/oauth/callback?provider=gitee}
  qq:
    client-id: ${OAUTH_QQ_CLIENT_ID:}
    client-secret: ${OAUTH_QQ_CLIENT_SECRET:}
    redirect-uri: ${OAUTH_QQ_REDIRECT_URI:http://localhost:8080/api/auth/oauth/callback?provider=qq}


jwt:
  secret: ${JWT_SECRET:}  # 必须通过环境变量设置，不提供默认值防止误用
  access-expiration: 7200000 # 2 小时
  refresh-expiration: 2592000000 # 30 天

# Cookie 配置
cookie:
  domain: ${COOKIE_DOMAIN:localhost}
  secure: ${COOKIE_SECURE:false} # 生产环境必须为 true (HTTPS)
  same-site: Lax # Strict / Lax / None
  max-age: 2592000 # 30 天

# 微信公众号配置（生产环境通过环境变量注入）
wechat:
  mp:
    app-id: ${WECHAT_MP_APP_ID:}
    secret: ${WECHAT_MP_SECRET:}
    token: ${WECHAT_MP_TOKEN:}
    aes-key: ${WECHAT_MP_AES_KEY:}

# IP 限流配置
rate-limit:
  window-seconds: 60
  max-requests: 10

# 社区平台业务配置
community:
  # 发帖限制配置
  post:
    daily-limit: 50  # 每日发帖上限
    min-content-length: 10  # 最小内容长度
    max-content-length: 10000  # 最大内容长度

  # 缓存配置
  cache:
    ttl: 3600  # 缓存TTL(秒)
    user-cache-ttl: 1800  # 用户缓存TTL(秒)

# 本地文件存储配置
storage:
  local:
    root: ${STORAGE_LOCAL_ROOT:./uploads}      # 物理存储根目录
    url-prefix: /uploads                        # HTTP 访问前缀（需放行）

# 日志配置
logging:
  level:
    root: INFO
    cn.kong.cosmos: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

